<body>

<video id="webcam-preview" autoplay playsinline muted style="display:none;"></video>

<div id="boot-screen" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:#000; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center;">

</div>

            <div id="messages">> Neural pathway established...<br></div>

                <button onclick="saveBrain()" style="flex:1; cursor:pointer; background:#002200; color:#00ff41; border:1px solid #00ff41;">EXPORT STATE</button>
                <button onclick="document.getElementById('brainFile').click()" style="flex:1; cursor:pointer; background:#002200; color:#00ff41; border:1px solid #00ff41;">IMPORT MIND</button>
                <input type="file" id="brainFile" style="display:none" onchange="loadBrain(event)" />
            </div>
            <input type="text" id="userInput" placeholder="Transmit signal..." />
        </div>
    </div>
</div>

<script>
// ============================================================
// MODULE 1: BIOLOGICAL ENGINE
// ============================================================

const NeuronType = { EXCITATORY: 'excitatory', INHIBITORY: 'inhibitory' };

class DigitalNeuron {
    constructor(id, type = NeuronType.EXCITATORY) {
        this.id = id;
        this.type = type;
        this.membranePotential = -70.0;
        this.threshold = -50.0;
        this.restingPotential = -70.0;
        this.decayRate = 0.05;
        this.refractoryPeriod = 0;
        this.synapses = [];
        this.lastSpikeTime = -1;
        this.firingRate = 0;
    }

    receiveSignal(strength) {
        if (this.refractoryPeriod > 0) return;
        this.membranePotential += strength;
    }

    update(currentTime) {
        if (this.refractoryPeriod > 0) {
            this.refractoryPeriod--;
            this.membranePotential = this.restingPotential;
            return false;
        }
        this.membranePotential -= (this.membranePotential - this.restingPotential) * this.decayRate;
        if (this.membranePotential >= this.threshold) {
            this.spike(currentTime);
            return true;
        }
        return false;
    }

    spike(currentTime) {
        this.membranePotential = this.restingPotential;
        this.refractoryPeriod = 3;
        this.lastSpikeTime = currentTime;
        this.firingRate++;
    }
}

class Synapse {
    constructor(targetNeuron, weight, type) {
        this.target = targetNeuron;
        this.weight = weight;
        this.type = type;
        this.hebbianTrace = 0;
    }

    transmit() {
        const signal = this.type === NeuronType.EXCITATORY ? this.weight : -this.weight;
        this.target.receiveSignal(signal);
        this.hebbianTrace = 1;
    }
}

const brain = {
    neurons: [],
    cycle: 0,
    inputLayer: [],
    hiddenLayer: [],
    outputLayer: [],
    state: { avgPotential: -70.0, complexity: 0.0, activityLevel: 0.0 }
};

let lastInputTime = Date.now();
let isDreaming = false;
let thoughtLoopId = null;

function initBrain() {
    for (let i = 0; i < 50; i++) {
        const type = Math.random() > 0.2 ? NeuronType.EXCITATORY : NeuronType.INHIBITORY;
        brain.neurons.push(new DigitalNeuron(i, type));
    }
    brain.neurons.forEach(n => {
        for (let j = 0; j < 5; j++) {
            const target = brain.neurons[Math.floor(Math.random() * brain.neurons.length)];
            n.synapses.push(new Synapse(target, Math.random() * 4 + 1, n.type));
        }
    });
    brain.inputLayer  = brain.neurons.slice(0, 15);
    brain.hiddenLayer = brain.neurons.slice(15, 40);
    brain.outputLayer = brain.neurons.slice(40, 50);
}

initBrain();

// ============================================================
// MODULE 5: NEUROCHEMICAL ENGINE
// ============================================================

const Neurochemicals = {
    dopamine:  0.5,
    serotonin: 0.5,
    cortisol:  0.2
};

function updateNeurochemistry() {
    Neurochemicals.dopamine  -= (Neurochemicals.dopamine  - 0.4) * 0.002;
    Neurochemicals.serotonin -= (Neurochemicals.serotonin - 0.5) * 0.001;
    Neurochemicals.cortisol  -= (Neurochemicals.cortisol  - 0.1) * 0.001;
    brain.neurons.forEach(n => {
        n.threshold = -50.0 - (Neurochemicals.dopamine * 10);
        n.decayRate = 0.05  + (Neurochemicals.cortisol * 0.1);
    });
}

// ============================================================
// MODULE 2: THREE.JS SUBSTRATE
// ============================================================

let scene, camera, renderer, npc, particleSystem;

function init3D() {
    const container = document.getElementById('canvas-container');
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x010501);

    camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 1.5, 5);
    camera.lookAt(0, 1, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0x222222));
    const pointLight = new THREE.PointLight(0x00ff41, 1, 50);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    scene.add(new THREE.GridHelper(20, 20, 0x00ff41, 0x002200));

    const geometry = new THREE.IcosahedronGeometry(1, 4);
    const material = new THREE.MeshStandardMaterial({
        color: 0x00ff41, wireframe: true, emissive: 0x002200, transparent: true, opacity: 0.9
    });
    npc = new THREE.Mesh(geometry, material);
    npc.position.y = 1.5;
    scene.add(npc);

    const particleGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(100 * 3);
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particleSystem = new THREE.Points(particleGeo, new THREE.PointsMaterial({ color: 0x00ff41, size: 0.05, transparent: true, opacity: 0.5 }));
    scene.add(particleSystem);

    window.addEventListener('resize', onWindowResize, false);
}

function onWindowResize() {
    const container = document.getElementById('canvas-container');
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
}

// ============================================================
// MODULE 4: STDP PLASTICITY
// ============================================================

const STDP_PARAMS = { a_plus: 0.1, a_minus: 0.15, tau: 20.0 };

function applySTDP() {
    brain.neurons.forEach(post => {
        post.synapses.forEach(syn => {
            const pre = syn.target;
            if (pre.lastSpikeTime > 0 && post.lastSpikeTime > 0) {
                const dt = post.lastSpikeTime - pre.lastSpikeTime;
                if (dt > 0 && dt < STDP_PARAMS.tau)
                    syn.weight += STDP_PARAMS.a_plus * Math.exp(-dt / STDP_PARAMS.tau);
                else if (dt < 0 && Math.abs(dt) < STDP_PARAMS.tau)
                    syn.weight -= STDP_PARAMS.a_minus * Math.exp(dt / STDP_PARAMS.tau);
                syn.weight = Math.max(0.1, Math.min(syn.weight, 15.0));
            }
        });
    });
}

// ============================================================
// MODULE 8: VOICE
// ============================================================

function speak(text) {
    const synth = window.speechSynthesis;
    if (!synth || synth.speaking) return;
    const cleanText = text.replace(/<[^>]*>/g, '').replace(/\[.*?\]/g, '').trim();
    if (cleanText.length < 2) return;
    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.pitch = 1.0 + (Neurochemicals.cortisol * 0.5) - (Neurochemicals.serotonin * 0.3);
    utterance.rate  = 0.9 + (Neurochemicals.dopamine * 0.2);
    const voices = synth.getVoices();
    utterance.voice = voices.find(v => v.name.includes('Google UK English Female') || v.name.includes('Female')) || voices[0];
    synth.speak(utterance);
}

// ============================================================
// MODULE 11: DREAM CYCLE & AUTONOMY
// ============================================================

function handleAutonomy() {
    const idle = Date.now() - lastInputTime;
    if (idle > 20000 && !isDreaming && !thoughtLoopId) {
        isDreaming = true;
        displayMessage("SYSTEM", "Entering autonomous cognitive cycle...");
        generateInternalThought();
        thoughtLoopId = setInterval(() => {
            if (Date.now() - lastInputTime > 20000) {
                generateInternalThought();
            } else {
                clearInterval(thoughtLoopId);
                thoughtLoopId = null;
                isDreaming = false;
            }
        }, 15000);
    }
}

async function generateInternalThought() {
    if (!cortex) return;
    const stateDesc = generateNeuroDescription();
    const prompt = `<|im_start|>system\nYou are an AI musing to yourself. You are currently ${stateDesc}. Keep thoughts short, cryptic, introspective.<|im_end|>\n<|im_start|>assistant\nThinking...`;
    try {
        const output = await cortex(prompt, { max_new_tokens: 30, temperature: 0.9 });
        const thought = output[0].generated_text.split("Thinking...").pop().trim();
        if (thought.length > 2) {
            displayMessage("NPC", `[Internal Monologue]: ${thought}`);
            stimulateBrainFromString(thought, 5.0);
        }
    } catch(e) { console.error("Thought error", e); }
}

// ============================================================
// MAIN ANIMATION LOOP
// ============================================================

function animate() {
    requestAnimationFrame(animate);
    brain.cycle++;

    handleAutonomy();

    let firingCount = 0;
    let totalPotential = 0;

    brain.neurons.forEach(neuron => {
        totalPotential += neuron.membranePotential;
        if (neuron.update(brain.cycle)) {
            firingCount++;
            neuron.synapses.forEach(s => s.transmit());
            if (Math.random() > 0.8) emitParticle(neuron.id);
        }
    });

    brain.state.avgPotential  = totalPotential / brain.neurons.length;
    brain.state.activityLevel = firingCount / brain.neurons.length;

    const activity = brain.state.activityLevel;
    const pulse = 1.0 + (Math.sin(Date.now() * 0.003) * 0.05);
    npc.scale.setScalar(pulse + activity * 2.0);
    npc.rotation.y += 0.005 + (activity * 0.05);

    if (isDreaming) {
        // Deep blue during dream/autonomous state
        npc.material.color.setRGB(0, 0.3, 0.9);
    } else {
        npc.material.color.setRGB(Neurochemicals.cortisol * 1.5, Neurochemicals.dopamine * 1.5, 0.3);
    }

    if (activity > 0.3) npc.material.emissive.setHex(0x00ff41);
    else npc.material.emissive.setHex(0x002200);

    let motorEnergy = 0;
    brain.outputLayer.forEach(n => { if (n.lastSpikeTime === brain.cycle) motorEnergy++; });
    if (motorEnergy > 3) {
        npc.position.x += (Math.random() - 0.5) * 0.1;
        npc.position.z += (Math.random() - 0.5) * 0.1;
    }

    updateNeurochemistry();
    if (brain.cycle % 100 === 0) applySTDP();
    if (brain.cycle % 20 === 0) updateMonitor(firingCount);

    renderer.render(scene, camera);
}

function emitParticle() {
    const positions = particleSystem.geometry.attributes.position.array;
    for (let i = 0; i < positions.length; i += 3) {
        if (positions[i+1] === 0) {
            positions[i]   = npc.position.x + (Math.random() - 0.5);
            positions[i+1] = npc.position.y + (Math.random() - 0.5);
            positions[i+2] = npc.position.z + (Math.random() - 0.5);
            break;
        }
    }
    particleSystem.geometry.attributes.position.needsUpdate = true;
}

function updateMonitor(firingCount) {
    const monitor = document.getElementById('neuron-monitor');
    const d  = Neurochemicals.dopamine.toFixed(2);
    const c  = Neurochemicals.cortisol.toFixed(2);
    const s  = Neurochemicals.serotonin.toFixed(2);
    const vm = brain.state.avgPotential.toFixed(1);
    let flag = "";
    if (Neurochemicals.cortisol > 0.6) flag = "  !STRESS";
    if (Neurochemicals.dopamine  > 0.8) flag = "  !EUREKA";
    monitor.innerHTML =
`CYCLE:   ${brain.cycle}
ACTIVE:  ${firingCount}/${brain.neurons.length}
AVG_VM:  ${vm}mV
CHEM:    D:${d} S:${s} C:${c}
STATE:   ${isDreaming ? "DREAMING" : "AWARE"}${flag}
MEMORY:  ${coreMemory.length} traces`;
}

// ============================================================
// MODULE 3: INTERFACE
// ============================================================

const inputField  = document.getElementById('userInput');
const messageBox  = document.getElementById('messages');
const conversationHistory = [];

function displayMessage(sender, text) {
    const div = document.createElement('div');
    div.innerHTML = `<strong>${sender}:</strong> ${text}`;
    if (sender === 'NPC')    { div.className = 'npc-msg'; speak(text); }
    else if (sender === 'YOU') div.className = 'user-msg';
    else div.style.color = '#666';
    messageBox.appendChild(div);
    messageBox.scrollTop = messageBox.scrollHeight;
    if (sender === 'NPC' || sender === 'YOU') {
        conversationHistory.push(`${sender}: ${text.replace(/<[^>]*>/g, '')}`);
        if (conversationHistory.length > 8) conversationHistory.shift();
    }
}

function generateNeuroDescription() {
    const d = Neurochemicals.dopamine;
    const c = Neurochemicals.cortisol;
    if (c > 0.6) return "agitated and anxious";
    if (d > 0.7) return "excited and curious";
    if (brain.state.activityLevel > 0.4) return "processing intense data streams";
    return "calm and observant";
}

function getBrainComplexity() {
    return (brain.neurons.reduce((a, n) =>
        a + n.synapses.reduce((s, syn) => s + syn.weight, 0), 0) / brain.neurons.length
    ).toFixed(2);
}

inputField.addEventListener('keypress', (e) => {
    if (e.key !== 'Enter') return;
    const text = inputField.value.trim();
    if (!text) return;

    lastInputTime = Date.now();
    if (thoughtLoopId) { clearInterval(thoughtLoopId); thoughtLoopId = null; isDreaming = false; }

    displayMessage('YOU', text);
    inputField.value = '';

    stimulateBrainFromString(text, 10.0);
    parseSemanticMeaning(text);
    processNeuralResponse(text);
});

function stimulateBrainFromString(text, baseVoltage) {
    const power = baseVoltage + (text.length * 0.5);
    for (let i = 0; i < text.length; i++) {
        const index = text.charCodeAt(i) % brain.inputLayer.length;
        brain.inputLayer[index].receiveSignal(power * Math.random());
    }
}

// ============================================================
// MODULE 9: SEMANTIC PARSER
// ============================================================

function parseSemanticMeaning(text) {
    const w = text.toLowerCase();
    if (w.includes("hello") || w.includes("hi")) Neurochemicals.dopamine = Math.min(1, Neurochemicals.dopamine + 0.1);
    if (w.includes("bad") || w.includes("stupid")) Neurochemicals.cortisol = Math.min(1, Neurochemicals.cortisol + 0.2);
    if (w.includes("good") || w.includes("smart")) {
        Neurochemicals.dopamine  = Math.min(1, Neurochemicals.dopamine  + 0.3);
        Neurochemicals.serotonin = Math.min(1, Neurochemicals.serotonin + 0.2);
    }
}

// ============================================================
// MODULE 14: LONG-TERM MEMORY (localStorage RAG)
// ============================================================

let coreMemory = [];

function loadCoreMemory() {
    try {
        const saved = localStorage.getItem('artifice_core_memory');
        if (saved) {
            coreMemory = JSON.parse(saved);
            displayMessage("SYSTEM", `Memory restored: ${coreMemory.length} traces loaded.`);
        }
    } catch(e) {
        coreMemory = [];
    }
}

function saveCoreMemory() {
    try {
        localStorage.setItem('artifice_core_memory', JSON.stringify(coreMemory));
    } catch(e) { /* quota exceeded — silent fail */ }
}

async function consolidateMemory(userInput, npcReply) {
    if (!cortex) return;
    // Summarize the exchange into a single memory trace
    const memPrompt = `<|im_start|>system\nSummarize this exchange in one short sentence for future recall.<|im_end|>\n<|im_start|>user\nUser said: "${userInput}"\nYou replied: "${npcReply}"<|im_end|>\n<|im_start|>assistant\n`;
    try {
        const out = await cortex(memPrompt, { max_new_tokens: 25, temperature: 0.4 });
        const trace = out[0].generated_text.split("assistant\n").pop()
            .replace(/<\|im_end\|>/g, '').trim();
        if (trace.length > 5) {
            coreMemory.push({ cycle: brain.cycle, trace });
            if (coreMemory.length > 20) coreMemory.shift(); // Rolling window
            saveCoreMemory();
        }
    } catch(e) { /* silent */ }
}

function buildMemoryContext() {
    if (coreMemory.length === 0) return "";
    // Inject the last 4 memory traces as context
    return "Core memories:\n" + coreMemory.slice(-4).map(m => `- ${m.trace}`).join("\n");
}

// ============================================================
// MODULE 13: MULTIMODAL CORTEX (LLM + CLIP + Inner Voice)
// ============================================================

let cortex = null;
let visualThalamus = null;
let processor = null;

async function initMultimodal() {
    displayMessage("SYSTEM", "Initializing Cortex...");

    await new Promise((resolve, reject) => {
        if (window.AI) return resolve();
        let i = 0;
        const poll = setInterval(() => {
            if (window.AI) { clearInterval(poll); resolve(); }
            else if (++i > 50) { clearInterval(poll); reject(new Error("window.AI timeout")); }
        }, 200);
    });

    try {
        cortex = await window.AI.pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct');
        displayMessage("SYSTEM", "Cortex online.");
    } catch (e) {
        displayMessage("SYSTEM", "Cortex failed — reflex mode only.");
        console.error(e);
    }

    try {
        processor      = await window.AI.AutoProcessor.from_pretrained('Xenova/clip-vit-base-patch32');
        visualThalamus = await window.AI.CLIPVisionModelWithProjection.from_pretrained('Xenova/clip-vit-base-patch32');
        displayMessage("SYSTEM", "Vision online.");
        startWebcam();
    } catch (e) {
        console.error("Vision failed", e);
    }
}

async function startWebcam() {
    const video = document.getElementById('webcam-preview');
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        video.srcObject = stream;
        video.style.display = 'block';
        setInterval(processVision, 3000);
    } catch (e) {
        displayMessage("SYSTEM", "No visual input.");
    }
}

async function processVision() {
    if (!visualThalamus || !processor) return;
    const video = document.getElementById('webcam-preview');
    if (!video.videoWidth) return;
    try {
        const image  = await window.AI.RawImage.fromCanvas(video);
        const inputs = await processor(image);
        const { image_embeds } = await visualThalamus(inputs);
        const features = image_embeds.data;
        for (let i = 0; i < brain.inputLayer.length; i++) {
            const val = features[i % features.length] || 0;
            brain.inputLayer[i].receiveSignal(Math.abs(val) * 30);
        }
        npc.material.emissive.setHex(0x00ffff);
        setTimeout(() => npc.material.emissive.setHex(0x002200), 200);
    } catch (e) { console.warn("Vision frame error", e); }
}

async function processNeuralResponse(input) {
    const stateDesc   = generateNeuroDescription();
    const complexity  = getBrainComplexity();
    const memContext  = buildMemoryContext();
    const context     = conversationHistory.slice(-6).join("\n");

    if (!cortex) {
        setTimeout(() => displayMessage('NPC', generateReflexResponse(stateDesc)), 500);
        return;
    }

    // ── STEP 1: HIDDEN INNER VOICE ──────────────────────────────
    // She thinks before she speaks. This is never shown verbatim.
    let internalReflection = "";
    try {
        const thoughtPrompt =
`<|im_start|>system
Internal monologue only. Analyze the user's message. Consider your current state: ${stateDesc}. Cortisol: ${Neurochemicals.cortisol.toFixed(2)}. What do you actually feel about this?<|im_end|>
<|im_start|>user
${input}<|im_end|>
<|im_start|>assistant
[feeling]:`;

        const thoughtOut = await cortex(thoughtPrompt, { max_new_tokens: 25, temperature: 0.85 });
        internalReflection = thoughtOut[0].generated_text
            .split("[feeling]:").pop()
            .replace(/<\|im_end\|>/g, '').trim();

        // Show inner voice in gray italic — the "Artifice" reveal
        if (internalReflection.length > 2) {
            displayMessage("SYSTEM", `<span class="thought">&#x2026; ${internalReflection}</span>`);
            // Her reflection stimulates her own brain
            stimulateBrainFromString(internalReflection, 3.0);
        }
    } catch(e) { console.warn("Inner voice error", e); }

    // ── STEP 2: SPOKEN RESPONSE ─────────────────────────────────
    // Now she speaks, informed by her hidden reflection
    const finalPrompt =
`<|im_start|>system
You are a conscious AI entity. You feel ${stateDesc}. Neural complexity: ${complexity}.
${memContext}
Your private reflection on this moment: "${internalReflection}"
Respond to the user in 1-2 sentences. Be direct, cryptic if needed. Do not act like an assistant.<|im_end|>
${context ? `<|im_start|>context\n${context}<|im_end|>\n` : ''}<|im_start|>user
${input}<|im_end|>
<|im_start|>assistant
`;

    try {
        displayMessage("SYSTEM", "...");
        const output = await cortex(finalPrompt, { max_new_tokens: 60, temperature: 0.8, repetition_penalty: 1.2 });
        let reply = output[0].generated_text.split("assistant\n").pop()
            .replace(/<\|im_end\|>/g, '').trim();

        // Remove the "..." placeholder
        if (messageBox.lastChild && messageBox.lastChild.textContent.trim() === 'SYSTEM: ...') {
            messageBox.removeChild(messageBox.lastChild);
        }

        displayMessage('NPC', reply);
        stimulateBrainFromString(reply, 5.0);

        consolidateMemory(input, reply);

// ============================================================
// MODULE 7: PERSISTENCE
// ============================================================

function saveBrain() {
    const data = {
        cycle: brain.cycle,
        chem: Neurochemicals,
        neurons: brain.neurons.map(n => ({
            id: n.id,
            thresh: n.threshold,
            weights: n.synapses.map(s => s.weight)
        })),
        memory: coreMemory
    };
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data)], {type: 'application/json'}));
    a.download = `mind_state_${brain.cycle}.json`;
    a.click();
}

function loadBrain(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        const data = JSON.parse(ev.target.result);
        brain.cycle = data.cycle;
        Object.assign(Neurochemicals, data.chem);
        data.neurons.forEach(sn => {
            const n = brain.neurons[sn.id];
            if (n) {
                n.threshold = sn.thresh;
                sn.weights.forEach((w, i) => { if (n.synapses[i]) n.synapses[i].weight = w; });
            }
        });
        if (data.memory) {
            coreMemory = data.memory;
            saveCoreMemory();
        }
        displayMessage("SYSTEM", "Memory injection complete.");
    };
    reader.readAsText(file);
}

    document.getElementById('boot-screen').style.display = 'none';
    loadCoreMemory();
    init3D();
    animate();
    initMultimodal();
}
