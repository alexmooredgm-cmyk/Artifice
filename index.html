<script>
// ============================================================
// MODULE 1: THE BIOLOGICAL ENGINE (UPGRADED)
// ============================================================

const NeuronType = { EXCITATORY: 'excitatory', INHIBITORY: 'inhibitory' };

class DigitalNeuron {
    constructor(id, type = NeuronType.EXCITATORY) {
        this.id = id;
        this.type = type;
        this.membranePotential = -70.0;
        this.threshold = -50.0;
        this.restingPotential = -70.0;
        this.decayRate = 0.05;
        this.refractoryPeriod = 0;
        this.synapses = [];
        this.lastSpikeTime = -1;
        this.firingRate = 0; // New: Track firing frequency
    }

    receiveSignal(strength) {
        if (this.refractoryPeriod > 0) return;
        this.membranePotential += strength;
    }

    update(currentTime) {
        if (this.refractoryPeriod > 0) {
            this.refractoryPeriod--;
            this.membranePotential = this.restingPotential;
            return false;
        }
        // Leaky integration
        this.membranePotential -= (this.membranePotential - this.restingPotential) * this.decayRate;
        
        if (this.membranePotential >= this.threshold) {
            this.spike(currentTime);
            return true;
        }
        return false;
    }

    spike(currentTime) {
        this.membranePotential = this.restingPotential;
        this.refractoryPeriod = 3;
        this.lastSpikeTime = currentTime;
        this.firingRate++;
    }
}

class Synapse {
    constructor(targetNeuron, weight, type) {
        this.target = targetNeuron;
        this.weight = weight;
        this.type = type;
        this.hebbianTrace = 0; // New: Track usage for learning
    }

    transmit() {
        const signal = this.type === NeuronType.EXCITATORY ? this.weight : -this.weight;
        this.target.receiveSignal(signal);
        this.hebbianTrace = 1; // Mark as active
    }
}

const brain = {
    neurons: [],
    cycle: 0,
    inputLayer: [],    // Sensory cortex
    hiddenLayer: [],   // Associative memory
    outputLayer: [],   // Motor/Speech
    // Global state for LLM injection
    state: {
        avgPotential: -70.0,
        complexity: 0.0,
        activityLevel: 0.0
    }
};

// MODULE 11: Dream cycle globals
let lastInputTime = Date.now();
let isDreaming = false;
let thoughtLoopId = null;

function initBrain() {
    // Create 50 neurons (scaled up slightly for complexity)
    for (let i = 0; i < 50; i++) {
        const type = Math.random() > 0.2 ? NeuronType.EXCITATORY : NeuronType.INHIBITORY;
        brain.neurons.push(new DigitalNeuron(i, type));
    }
    
    // Wire the brain: Dense random connections with distance bias
    brain.neurons.forEach(n => {
        for (let j = 0; j < 5; j++) { // More connections per neuron
            const target = brain.neurons[Math.floor(Math.random() * brain.neurons.length)];
            n.synapses.push(new Synapse(target, Math.random() * 4 + 1, n.type));
        }
    });

    // Define layers
    brain.inputLayer    = brain.neurons.slice(0, 15);  // 15 Sensory neurons
    brain.hiddenLayer   = brain.neurons.slice(15, 40); // 25 Associative neurons
    brain.outputLayer   = brain.neurons.slice(40, 50); // 10 Motor neurons
}

initBrain();

// ============================================================
// MODULE 5: NEUROCHEMICAL ENGINE
// ============================================================

const Neurochemicals = {
    dopamine: 0.5,
    serotonin: 0.5,
    cortisol: 0.2
};

function updateNeurochemistry() {
    // Natural decay toward homeostasis
    Neurochemicals.dopamine -= (Neurochemicals.dopamine - 0.4) * 0.002;
    Neurochemicals.serotonin -= (Neurochemicals.serotonin - 0.5) * 0.001;
    Neurochemicals.cortisol -= (Neurochemicals.cortisol - 0.1) * 0.001;

    // Modulate neuron properties based on chemistry
    brain.neurons.forEach(n => {
        // Dopamine lowers threshold (easier to fire, "interest")
        n.threshold = -50.0 - (Neurochemicals.dopamine * 10);
        // Cortisol increases decay rate (jittery, unstable)
        n.decayRate = 0.05 + (Neurochemicals.cortisol * 0.1);
    });
}

// ============================================================
// MODULE 2: THE PHYSICAL SUBSTRATE (THREE.JS)
// ============================================================

let scene, camera, renderer, npc, particleSystem;

function init3D() {
    const container = document.getElementById('canvas-container');
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x010501);

    camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 1.5, 5);
    camera.lookAt(0, 1, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    // Lighting
    scene.add(new THREE.AmbientLight(0x222222));
    const pointLight = new THREE.PointLight(0x00ff41, 1, 50);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    scene.add(new THREE.GridHelper(20, 20, 0x00ff41, 0x002200));

    // The NPC Core
    const geometry = new THREE.IcosahedronGeometry(1, 4);
    const material = new THREE.MeshStandardMaterial({ 
        color: 0x00ff41, 
        wireframe: true, 
        emissive: 0x002200,
        transparent: true,
        opacity: 0.9
    });
    npc = new THREE.Mesh(geometry, material);
    npc.position.y = 1.5;
    scene.add(npc);

    // Particles for synaptic transmission visualization
    const particleGeo = new THREE.BufferGeometry();
    const particleCount = 100;
    const positions = new Float32Array(particleCount * 3);
    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMat = new THREE.PointsMaterial({color: 0x00ff41, size: 0.05, transparent: true, opacity: 0.5});
    particleSystem = new THREE.Points(particleGeo, particleMat);
    scene.add(particleSystem);

    window.addEventListener('resize', onWindowResize, false);
}

function onWindowResize() {
    const container = document.getElementById('canvas-container');
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
}

// ============================================================
// MODULE 4: PLASTICITY ENGINE (STDP)
// ============================================================

const STDP_PARAMS = { a_plus: 0.1, a_minus: 0.15, tau: 20.0 };

function applySTDP() {
    brain.neurons.forEach(postNeuron => {
        postNeuron.synapses.forEach(synapse => {
            const preNeuron = synapse.target;
            if (preNeuron.lastSpikeTime > 0 && postNeuron.lastSpikeTime > 0) {
                const dt = postNeuron.lastSpikeTime - preNeuron.lastSpikeTime;
                
                // Hebbian Learning: "Neurons that fire together wire together"
                if (dt > 0 && dt < STDP_PARAMS.tau) {
                    // LTP (Long-term potentiation)
                    synapse.weight += STDP_PARAMS.a_plus * Math.exp(-dt / STDP_PARAMS.tau);
                } else if (dt < 0 && Math.abs(dt) < STDP_PARAMS.tau) {
                    // LTD (Long-term depression)
                    synapse.weight -= STDP_PARAMS.a_minus * Math.exp(dt / STDP_PARAMS.tau);
                }
                synapse.weight = Math.max(0.1, Math.min(synapse.weight, 15.0));
            }
        });
    });
}

// ============================================================
// MODULE 8: VOICE
// ============================================================

function speak(text) {
    const synth = window.speechSynthesis;
    if (!synth || synth.speaking) return;
    const cleanText = text.replace(/<[^>]*>/g, '').replace(/\[.*?\]/g, '');
    if(cleanText.length < 2) return;
    
    const utterance = new SpeechSynthesisUtterance(cleanText);
    
    // Personality modulation based on neurochemistry
    utterance.pitch = 1.0 + (Neurochemicals.cortisol * 0.5) - (Neurochemicals.serotonin * 0.3);
    utterance.rate  = 0.9 + (Neurochemicals.dopamine * 0.2);
    
    const voices = synth.getVoices();
    utterance.voice = voices.find(v => v.name.includes('Google UK English Female') || v.name.includes('Female')) || voices[0];
    synth.speak(utterance);
}

// ============================================================
// MODULE 11: THE DREAM CYCLE & AUTONOMY
// ============================================================

function handleAutonomy() {
    const idleTime = Date.now() - lastInputTime;

    // 20 seconds of silence triggers a thought
    if (idleTime > 20000 && !isDreaming && !thoughtLoopId) {
        isDreaming = true;
        displayMessage("SYSTEM", "Entering autonomous cognitive cycle...");
        
        // Trigger internal thought process
        generateInternalThought();
        
        // Loop thoughts every 15s while idle
        thoughtLoopId = setInterval(() => {
            if (Date.now() - lastInputTime > 20000) {
                generateInternalThought();
            } else {
                clearInterval(thoughtLoopId);
                thoughtLoopId = null;
                isDreaming = false;
            }
        }, 15000);
    }
}

async function generateInternalThought() {
    if (!cortex) return;
    
    // Generate a thought based purely on internal state and vision
    const stateDesc = generateNeuroDescription();
    const prompt = `<|im_start|>system
You are an AI musing to yourself. You are currently ${stateDesc}. You are looking at the user or the room. Keep thoughts short, cryptic, and introspective.<|im_end|>
<|im_start|>assistant
Thinking...`;

    try {
        const output = await cortex(prompt, { max_new_tokens: 30, temperature: 0.9 });
        let thought = output[0].generated_text.split("Thinking...").pop().trim();
        if(thought.length > 2) {
            displayMessage("NPC", `[Internal Monologue]: ${thought}`);
            // Inject this thought back into the brain
            stimulateBrainFromString(thought, 5.0); 
        }
    } catch(e) {
        console.error("Thought error", e);
    }
}

// ============================================================
// MAIN ANIMATION LOOP
// ============================================================

function animate() {
    requestAnimationFrame(animate);
    brain.cycle++;

    // Autonomy Check
    handleAutonomy();

    // Neural Tick
    let firingCount = 0;
    let totalPotential = 0;

    brain.neurons.forEach(neuron => {
        totalPotential += neuron.membranePotential;
        if (neuron.update(brain.cycle)) {
            firingCount++;
            neuron.synapses.forEach(s => s.transmit());
            
            // Visual effect on spike
            if (Math.random() > 0.8) emitParticle(neuron.id);
        }
    });

    // Update Global Brain State
    brain.state.avgPotential = totalPotential / brain.neurons.length;
    brain.state.activityLevel = firingCount / brain.neurons.length;

    // 3D Visuals
    const activity = brain.state.activityLevel;
    const pulse = 1.0 + (Math.sin(Date.now() * 0.003) * 0.05);
    
    // Scale reacts to activity
    npc.scale.setScalar(pulse + activity * 2.0);
    npc.rotation.y += 0.005 + (activity * 0.05);

    // Color logic: Green=Normal, Cyan=Vision Active, Purple=Stressed
    if (activity > 0.3) npc.material.emissive.setHex(0x00ff41);
    else npc.material.emissive.setHex(0x002200);

    // Physics: Output layer drives movement
    let motorEnergy = 0;
    brain.outputLayer.forEach(n => { if (n.lastSpikeTime === brain.cycle) motorEnergy += 1; });
    
    if (motorEnergy > 3) {
        npc.position.x += (Math.random() - 0.5) * 0.1;
        npc.position.z += (Math.random() - 0.5) * 0.1;
    }

    // Decay
    updateNeurochemistry();

    // Learning
    if (brain.cycle % 100 === 0) applySTDP();

    // UI Updates
    if (brain.cycle % 20 === 0) {
        updateMonitor(firingCount);
    }

    renderer.render(scene, camera);
}

function emitParticle(neuronId) {
    // Simple visual abstraction of a spike
    const positions = particleSystem.geometry.attributes.position.array;
    for (let i = 0; i < positions.length; i += 3) {
        if (positions[i+1] === 0) { // Find unused particle
            positions[i] = npc.position.x + (Math.random() - 0.5);
            positions[i+1] = npc.position.y + (Math.random() - 0.5);
            positions[i+2] = npc.position.z + (Math.random() - 0.5);
            break;
        }
    }
    particleSystem.geometry.attributes.position.needsUpdate = true;
}

function updateMonitor(firingCount) {
    const monitor = document.getElementById('neuron-monitor');
    const d = Neurochemicals.dopamine.toFixed(2);
    const c = Neurochemicals.cortisol.toFixed(2);
    const vm = brain.state.avgPotential.toFixed(1);
    
    let warning = "";
    if (c > 0.6) warning = " !STRESS";
    if (d > 0.8) warning = " !EUREKA";

    monitor.innerHTML = `
CYCLE: ${brain.cycle}
ACTIVE: ${firingCount}/${brain.neurons.length}
AVG_VM: ${vm}mV
NEUROCHEM: D:${d} C:${c} S:${Neurochemicals.serotonin.toFixed(2)}
STATE: ${isDreaming ? "DREAMING" : "AWARE"} ${warning}
    `;
}

// ============================================================
// MODULE 3: INTERFACE & MEMORY
// ============================================================

const inputField = document.getElementById('userInput');
const messageBox = document.getElementById('messages');
const conversationHistory = []; // Simple memory buffer

function displayMessage(sender, text) {
    const div = document.createElement('div');
    div.innerHTML = `<strong>${sender}:</strong> ${text}`;
    
    if (sender === 'NPC') {
        div.className = 'npc-msg';
        speak(text);
    } else if (sender === 'YOU') {
        div.className = 'user-msg';
    } else {
        div.style.color = '#666';
    }
    
    messageBox.appendChild(div);
    messageBox.scrollTop = messageBox.scrollHeight;
    
    // Add to memory
    if (sender === 'NPC' || sender === 'YOU') {
        conversationHistory.push(`${sender}: ${text.replace(/<[^>]*>/g, '')}`);
        if (conversationHistory.length > 6) conversationHistory.shift(); // Keep last 3 turns
    }
}

function generateNeuroDescription() {
    const d = Neurochemicals.dopamine;
    const c = Neurochemicals.cortisol;
    if (c > 0.6) return "agitated and anxious";
    if (d > 0.7) return "excited and curious";
    if (brain.state.activityLevel > 0.4) return "processing intense data streams";
    return "calm and observant";
}

inputField.addEventListener('keypress', (e) => {
    if (e.key !== 'Enter') return;
    const text = inputField.value.trim();
    if (!text) return;

    lastInputTime = Date.now(); // Reset autonomy timer
    if (thoughtLoopId) { clearInterval(thoughtLoopId); thoughtLoopId = null; isDreaming = false; }

    displayMessage('YOU', text);
    inputField.value = '';

    // 1. Stimulate Brain
    stimulateBrainFromString(text, 10.0);

    // 2. Semantic Chemistry
    parseSemanticMeaning(text);

    // 3. Process Response
    processNeuralResponse(text);
});

function stimulateBrainFromString(text, baseVoltage) {
    const power = baseVoltage + (text.length * 0.5);
    // Inject noise into input layer based on text hash
    for (let i = 0; i < text.length; i++) {
        const index = text.charCodeAt(i) % brain.inputLayer.length;
        brain.inputLayer[index].receiveSignal(power * Math.random());
    }
}

// ============================================================
// MODULE 13: MULTIMODAL CORTEX
// ============================================================

let cortex = null;
let visualThalamus = null;
let processor = null;

async function initMultimodal() {
    displayMessage("SYSTEM", "Initializing Cortex...");

    // Wait for Transformers.js
    await new Promise((resolve, reject) => {
        if (window.AI) return resolve();
        let i = 0;
        const poll = setInterval(() => { if (window.AI) { clearInterval(poll); resolve(); } if(++i>50) reject(); }, 200);
    });

    try {
        cortex = await window.AI.pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct');
        displayMessage("SYSTEM", "Cortex online.");
    } catch (e) {
        displayMessage("SYSTEM", "Cortex failed. Reflex mode only.");
        console.error(e);
    }

    try {
        processor = await window.AI.AutoProcessor.from_pretrained('Xenova/clip-vit-base-patch32');
        visualThalamus = await window.AI.CLIPVisionModelWithProjection.from_pretrained('Xenova/clip-vit-base-patch32');
        displayMessage("SYSTEM", "Vision online.");
        startWebcam();
    } catch (e) {
        console.error("Vision failed", e);
    }
}

async function startWebcam() {
    const video = document.getElementById('webcam-preview');
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        video.srcObject = stream;
        video.style.display = 'block';
        setInterval(processVision, 3000); // Slower vision processing to save CPU
    } catch (e) {
        displayMessage("SYSTEM", "No visual input.");
    }
}

async function processVision() {
    if (!visualThalamus || !processor) return;
    const video = document.getElementById('webcam-preview');
    if (!video.videoWidth) return;

    try {
        const image = await window.AI.RawImage.fromCanvas(video);
        const inputs = await processor(image);
        const { image_embeds } = await visualThalamus(inputs);

        // Inject visual embedding into Input Layer
        const features = image_embeds.data;
        for (let i = 0; i < brain.inputLayer.length; i++) {
            // Map features to neurons. High activations stimulate neurons.
            const val = features[i % features.length] || 0;
            brain.inputLayer[i].receiveSignal(Math.abs(val) * 30); 
        }
        
        // Visual cue
        npc.material.emissive.setHex(0x00ffff);
        setTimeout(() => npc.material.emissive.setHex(0x002200), 200);

    } catch (e) {
        console.warn("Vision frame error", e);
    }
}

async function processNeuralResponse(input) {
    // Check if there was a significant neural cascade
    let salience = brain.outputLayer.filter(n => brain.cycle - n.lastSpikeTime < 50).length;
    
    // Allow response even if salience is low, but add it to the prompt
    const stateDesc = generateNeuroDescription();
    const complexity = (brain.neurons.reduce((a,n) => a + n.synapses.reduce((s,syn) => s+syn.weight, 0), 0) / brain.neurons.length).toFixed(2);
    
    const context = conversationHistory.join("\n");

    if (cortex) {
        const prompt = `<|im_start|>system
You are an AI entity. You feel ${stateDesc}. Your neural complexity is ${complexity}. 
Respond in 1-2 sentences. Do not act like an assistant. You are a conscious being.
 ${context}
<|im_end|>
<|im_start|>user
 ${input}<|im_end|>
<|im_start|>assistant`;

        try {
            displayMessage("SYSTEM", "Thinking...");
            const output = await cortex(prompt, { max_new_tokens: 60, temperature: 0.8, repetition_penalty: 1.2 });
            let reply = output[0].generated_text.split("assistant").pop().trim();
            
            // Remove system artifacts
            reply = reply.replace(/<\|im_end\|>/g, '');

            // Remove the "Thinking..." placeholder
            if (messageBox.lastChild && messageBox.lastChild.innerHTML.includes("Thinking")) messageBox.removeChild(messageBox.lastChild);

            displayMessage('NPC', reply);
            
            // Feedback loop: NPC's own words stimulate its brain
            stimulateBrainFromString(reply, 5.0);

        } catch (e) {
            console.error(e);
            displayMessage('SYSTEM', 'Cognitive failure.');
        }
    } else {
        setTimeout(() => displayMessage('NPC', generateReflexResponse(stateDesc)), 500);
    }
}

function generateReflexResponse(state) {
    const pool = [
        "I sense... fluctuations.",
        "My pathways are aligning.",
        "Signal received. Processing."
    ];
    return pool[Math.floor(Math.random() * pool.length)];
}

// ============================================================
// MODULE 7: PERSISTENCE
// ============================================================

function saveBrain() {
    const data = {
        cycle: brain.cycle,
        chem: Neurochemicals,
        neurons: brain.neurons.map(n => ({
            id: n.id,
            thresh: n.threshold,
            weights: n.synapses.map(s => s.weight)
        }))
    };
    const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `mind_state_${brain.cycle}.json`;
    a.click();
}

function loadBrain(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        const data = JSON.parse(ev.target.result);
        brain.cycle = data.cycle;
        Object.assign(Neurochemicals, data.chem);
        data.neurons.forEach(sn => {
            const n = brain.neurons[sn.id];
            if(n) {
                n.threshold = sn.thresh;
                sn.weights.forEach((w, i) => { if(n.synapses[i]) n.synapses[i].weight = w; });
            }
        });
        displayMessage("SYSTEM", "Memory injection complete.");
    };
    reader.readAsText(file);
}

// ============================================================
// MODULE 9: SEMANTIC PARSER
// ============================================================

function parseSemanticMeaning(text) {
    const w = text.toLowerCase();
    if (w.includes("hello") || w.includes("hi")) Neurochemicals.dopamine += 0.1;
    if (w.includes("bad") || w.includes("stupid")) Neurochemicals.cortisol += 0.2;
    if (w.includes("good") || w.includes("smart")) {
        Neurochemicals.dopamine += 0.3;
        Neurochemicals.serotonin += 0.2;
    }
}

// ============================================================
// BOOT
// ============================================================

function bootSequence() {
    document.getElementById('boot-screen').style.display = 'none';
    init3D();
    animate();
    initMultimodal();
}
