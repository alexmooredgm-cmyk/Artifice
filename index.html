<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neuromorphic NPC - Spiking Neural Brain</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #050505; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; }
        #container { display: flex; width: 100vw; height: 100vh; }
        #canvas-container { flex: 2; position: relative; }
        #ui-layer { flex: 1; border-left: 1px solid #00ff41; display: flex; flex-direction: column; background: rgba(0,20,0,0.9); }
        #neuron-monitor { flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; border-bottom: 1px solid #00ff41; }
        #chat-area { flex: 1; display: flex; flex-direction: column; padding: 10px; }
        #messages { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        input[type="text"] { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 10px; outline: none; width: 100%; box-sizing: border-box; }
        button { font-family: 'Courier New', monospace; }
        .spike { color: #fff; text-shadow: 0 0 5px #fff; }
    </style>
</head>
<body>

<!-- MODULE 10: BOOT SCREEN -->
<div id="boot-screen" style="position:fixed; top:0; left:0; width:100vw; height:100vh; background:#000; z-index:9999; display:flex; flex-direction:column; justify-content:center; align-items:center;">
    <h1 style="color:#00ff41; font-family:monospace; margin-bottom:20px;">ARTIFICE_CORE V1.0</h1>
    <button onclick="bootSequence()" style="padding:20px 40px; background:none; border:2px solid #00ff41; color:#00ff41; font-family:monospace; cursor:pointer; font-size:20px;">INITIALIZE NEURAL SUBSTRATE</button>
</div>

<div id="container">
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div id="neuron-monitor">--- NEURAL ACTIVITY MONITOR ---<br></div>
        <div id="chat-area">
            <div id="messages">SYSTEM: Neural Substrate Initialized...</div>
            <div style="margin-bottom: 10px; display: flex; gap: 5px;">
                <button onclick="saveBrain()" style="flex: 1; cursor: pointer; background: #002200; color: #00ff41; border: 1px solid #00ff41;">EXTRACT CONSCIOUSNESS</button>
                <button onclick="document.getElementById('brainFile').click()" style="flex: 1; cursor: pointer; background: #002200; color: #00ff41; border: 1px solid #00ff41;">INJECT MEMORY</button>
                <input type="file" id="brainFile" style="display:none" onchange="loadBrain(event)" />
            </div>
            <input type="text" id="userInput" placeholder="Type to stimulate sensory neurons..." />
        </div>
    </div>
</div>

<script>

// ============================================================
// MODULE 1: THE BIOLOGICAL ENGINE
// ============================================================

const NeuronType = { EXCITATORY: 'excitatory', INHIBITORY: 'inhibitory' };

class DigitalNeuron {
    constructor(id, type = NeuronType.EXCITATORY) {
        this.id = id;
        this.type = type;
        this.membranePotential = -70.0;
        this.threshold = -50.0;
        this.restingPotential = -70.0;
        this.decayRate = 0.1;
        this.refractoryPeriod = 0;
        this.synapses = [];
        this.lastSpikeTime = -1;
    }

    receiveSignal(strength) {
        if (this.refractoryPeriod > 0) return;
        this.membranePotential += strength;
    }

    update(currentTime) {
        if (this.refractoryPeriod > 0) {
            this.refractoryPeriod--;
            this.membranePotential = this.restingPotential;
            return false;
        }
        this.membranePotential -= (this.membranePotential - this.restingPotential) * this.decayRate;
        if (this.membranePotential >= this.threshold) {
            this.spike(currentTime);
            return true;
        }
        return false;
    }

    spike(currentTime) {
        this.membranePotential = this.restingPotential;
        this.refractoryPeriod = 3;
        this.lastSpikeTime = currentTime;
    }
}

class Synapse {
    constructor(targetNeuron, weight, type) {
        this.target = targetNeuron;
        this.weight = weight;
        this.type = type;
    }

    transmit() {
        const signal = this.type === NeuronType.EXCITATORY ? this.weight : -this.weight;
        this.target.receiveSignal(signal);
    }
}

const brain = {
    neurons: [],
    cycle: 0,
    inputLayer: [],
    salienceLayer: [],
    outputLayer: []
};

// MODULE 11: Dream cycle globals
let lastInputTime = Date.now();
let isDreaming = false;

function initBrain() {
    for (let i = 0; i < 25; i++) {
        const type = Math.random() > 0.2 ? NeuronType.EXCITATORY : NeuronType.INHIBITORY;
        brain.neurons.push(new DigitalNeuron(i, type));
    }
    brain.neurons.forEach(n => {
        for (let j = 0; j < 3; j++) {
            const target = brain.neurons[Math.floor(Math.random() * brain.neurons.length)];
            n.synapses.push(new Synapse(target, Math.random() * 5, n.type));
        }
    });
    brain.inputLayer    = brain.neurons.slice(0, 10);
    brain.salienceLayer = brain.neurons.slice(10, 20);
    brain.outputLayer   = brain.neurons.slice(20, 25);
}

initBrain();

// ============================================================
// MODULE 5: NEUROCHEMICAL ENGINE (declared early — used everywhere)
// ============================================================

const Neurochemicals = {
    dopamine:    0.5,
    cortisol:    0.2,
    homeostasis: 0.5
};

function updateNeurochemistry() {
    Neurochemicals.dopamine -= (Neurochemicals.dopamine - 0.2) * 0.001;
    Neurochemicals.cortisol -= (Neurochemicals.cortisol - 0.1) * 0.0005;

    brain.neurons.forEach(n => {
        n.threshold = -50.0 - (Neurochemicals.dopamine * 10);
        n.decayRate = 0.05  + (Neurochemicals.cortisol * 0.2);
    });

    if (brain.cycle % 1000 === 0 && Neurochemicals.dopamine < 0.3) {
        Neurochemicals.cortisol += 0.05;
    }
}

// ============================================================
// MODULE 2: THE PHYSICAL SUBSTRATE (3D WORLD)
// ============================================================

let scene, camera, renderer, npc;

function init3D() {
    const container = document.getElementById('canvas-container');
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x020502);

    camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 1, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0x404040, 2));
    const pointLight = new THREE.PointLight(0x00ff41, 1, 10);
    pointLight.position.set(2, 3, 2);
    scene.add(pointLight);

    scene.add(new THREE.GridHelper(20, 20, 0x00ff41, 0x002200));

    const geometry = new THREE.IcosahedronGeometry(1, 15);
    const material = new THREE.MeshStandardMaterial({ color: 0x00ff41, wireframe: true, emissive: 0x003300 });
    npc = new THREE.Mesh(geometry, material);
    npc.position.y = 1.5;
    scene.add(npc);

    window.addEventListener('resize', onWindowResize, false);
}

function onWindowResize() {
    const container = document.getElementById('canvas-container');
    camera.aspect = container.clientWidth / container.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(container.clientWidth, container.clientHeight);
}

// ============================================================
// MODULE 4: PLASTICITY ENGINE (STDP)
// ============================================================

const STDP_PARAMS = { a_plus: 0.1, a_minus: 0.12, tau: 20.0 };

function applySTDP() {
    brain.neurons.forEach(postNeuron => {
        postNeuron.synapses.forEach(synapse => {
            const preNeuron = synapse.target;
            if (preNeuron.lastSpikeTime > 0 && postNeuron.lastSpikeTime > 0) {
                const dt = postNeuron.lastSpikeTime - preNeuron.lastSpikeTime;
                if (dt > 0 && dt < STDP_PARAMS.tau) {
                    synapse.weight += STDP_PARAMS.a_plus * Math.exp(-dt / STDP_PARAMS.tau);
                } else if (dt < 0 && Math.abs(dt) < STDP_PARAMS.tau) {
                    synapse.weight -= STDP_PARAMS.a_minus * Math.exp(dt / STDP_PARAMS.tau);
                }
                synapse.weight = Math.max(0.1, Math.min(synapse.weight, 10.0));
            }
        });
    });
}

// ============================================================
// MODULE 8: VOICE & VISION
// ============================================================

const VoiceSynth = window.speechSynthesis;

function speak(text) {
    if (VoiceSynth.speaking) return;
    const cleanText = text.replace(/<[^>]*>/g, '');
    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.pitch = 1.0 + (Neurochemicals.cortisol * 0.5) - (Neurochemicals.dopamine * 0.2);
    utterance.rate  = 0.9 + (Neurochemicals.cortisol * 0.3);
    const voices = VoiceSynth.getVoices();
    utterance.voice = voices.find(v => v.name.includes('Female') || v.name.includes('Google')) || voices[0];
    VoiceSynth.speak(utterance);
}

function simulateVision() {
    const raycaster = new THREE.Raycaster();
    const directions = [
        new THREE.Vector3(1, 0, 0), new THREE.Vector3(-1, 0, 0),
        new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0, -1)
    ];
    directions.forEach(dir => {
        raycaster.set(npc.position, dir);
        const intersects = raycaster.intersectObjects(scene.children);
        if (intersects.length > 0 && intersects[0].distance < 2) {
            brain.inputLayer[0].receiveSignal(-1.0);
            npc.material.emissive.setHex(0x330033);
        }
    });
}

// ============================================================
// MODULE 11: THE DREAM CYCLE (Offline Consolidation)
// ============================================================

function handleDreaming() {
    const idleTime = Date.now() - lastInputTime;

    // Enter Dream State after 60 seconds of silence
    if (idleTime > 60000 && !isDreaming) {
        isDreaming = true;
        displayMessage("SYSTEM", "NPC entering REM/Dream state. Consolidating synaptic weights...");
        speak("I am... processing. The patterns are becoming clearer.");
    }

    // Exit Dream State when user returns (reset via input listener)
    if (idleTime < 60000 && isDreaming) {
        isDreaming = false;
        displayMessage("SYSTEM", "Dream cycle interrupted. Returning to active awareness.");
    }

    if (isDreaming) {
        // Visual shift: deep blue/cyan glow
        npc.material.color.setRGB(0, 0.2, 0.8);
        npc.rotation.y += 0.002; // Slow, rhythmic rotation

        // Accelerated plasticity — STDP every 20 cycles instead of 100
        if (brain.cycle % 20 === 0) {
            applySTDP();
            // Random internal noise spikes to simulate memory replay
            brain.neurons[Math.floor(Math.random() * brain.neurons.length)].receiveSignal(5.0);
        }
    }
}

// ============================================================
// MAIN ANIMATION LOOP (single function, no reassignment chains)
// ============================================================

function animate() {
    requestAnimationFrame(animate);
    brain.cycle++;

    // Dream cycle check (Module 11)
    handleDreaming();

    // Neural tick
    let firingCount = 0;
    brain.neurons.forEach(neuron => {
        if (neuron.update(brain.cycle)) {
            firingCount++;
            neuron.synapses.forEach(s => s.transmit());
            if (Math.random() > 0.95) {
                const monitor = document.getElementById('neuron-monitor');
                monitor.innerHTML += `<span class="spike">ID:${neuron.id} SPIKE!</span> `;
                if (monitor.innerHTML.length > 1000) monitor.innerHTML = '';
                monitor.scrollTop = monitor.scrollHeight;
            }
        }
    });

    // NPC visuals — activity level drives scale and glow
    const activityLevel = firingCount / brain.neurons.length;
    const pulse = 1.0 + (Math.sin(Date.now() * 0.005) * 0.1);
    const scale = pulse + (activityLevel * 2.0);
    npc.scale.set(scale, scale, scale);
    npc.rotation.y += 0.01 + (activityLevel * 0.1);
    npc.material.emissive.setHex(activityLevel > 0.1 ? 0x00ff41 : 0x003300);

    // Neurochemical color: green=calm, yellow=dopamine, purple=cortisol
    npc.material.color.setRGB(Neurochemicals.cortisol * 2, Neurochemicals.dopamine * 2, 0.5);

    // Output layer movement
    let outputPower = 0;
    brain.outputLayer.forEach(n => { if (n.lastSpikeTime === brain.cycle) outputPower++; });
    if (outputPower > 2) {
        npc.position.x += (Math.random() - 0.5) * 0.2;
        npc.position.z += (Math.random() - 0.5) * 0.2;
    }

    // Neurochemistry decay + behavioral effects
    updateNeurochemistry();

    // Vision (proprioception)
    if (brain.cycle % 10 === 0) simulateVision();

    // STDP learning consolidation
    if (brain.cycle % 100 === 0) applySTDP();

    // Habituation — threshold fatigue
    if (brain.cycle % 500 === 0) {
        brain.neurons.forEach(n => {
            n.threshold += 0.1;
            if (n.threshold > -45) n.threshold = -50;
        });
    }

    // Monitor stats
    if (brain.cycle % 10 === 0) {
        const monitor = document.getElementById('neuron-monitor');
        const avgPotential = (brain.neurons.reduce((a, b) => a + b.membranePotential, 0) / brain.neurons.length).toFixed(2);
        const stats = `<div style="color:#fff">AVG_VM: ${avgPotential}mV | CYCLE: ${brain.cycle} | D:${Neurochemicals.dopamine.toFixed(2)} C:${Neurochemicals.cortisol.toFixed(2)}</div>`;
        monitor.innerHTML = stats + monitor.innerHTML.substring(0, 500);
    }

    renderer.render(scene, camera);
}

// ============================================================
// MODULE 3: SENSORY-MOTOR INTERFACE
// ============================================================

const inputField = document.getElementById('userInput');
const messageBox = document.getElementById('messages');

function getBrainStateReport() {
    const totalWeight = brain.neurons.reduce((acc, n) =>
        acc + n.synapses.reduce((sAcc, s) => sAcc + s.weight, 0), 0);
    const complexity = (totalWeight / (brain.neurons.length * 3)).toFixed(2);
    return `[NEURAL COMPLEXITY: ${complexity}]`;
}

function displayMessage(sender, text) {
    const div = document.createElement('div');
    if (sender === 'NPC') {
        text = `${text} <br><small style='color:#555'>${getBrainStateReport()}</small>`;
        speak(text);
    }
    div.innerHTML = `<strong>${sender}:</strong> ${text}`;
    messageBox.appendChild(div);
    messageBox.scrollTop = messageBox.scrollHeight;
}

inputField.addEventListener('keypress', (e) => {
    if (e.key !== 'Enter') return;
    const text = inputField.value.trim();
    if (!text) return;

    lastInputTime = Date.now(); // Reset dream idle timer (Module 11)

    displayMessage('YOU', text);

    // Module 9: Semantic voltage injection
    parseSemanticMeaning(text);

    // Module 5: Length/tone chemistry
    if (text.length > 20) {
        Neurochemicals.dopamine = Math.min(1.0, Neurochemicals.dopamine + 0.2);
        Neurochemicals.cortisol = Math.max(0.0, Neurochemicals.cortisol - 0.05);
    } else if (text.includes('!') || text.length < 3) {
        Neurochemicals.cortisol = Math.min(1.0, Neurochemicals.cortisol + 0.15);
    }

    // Raw voltage injection proportional to message length
    const stimulusPower = Math.min(text.length * 2, 40);
    brain.inputLayer.forEach(n => {
        if (Math.random() > 0.3) n.receiveSignal(stimulusPower * Math.random());
    });

    inputField.value = '';
    processNeuralResponse(text);
});

function processNeuralResponse(input) {
    let salienceScore = 0;
    brain.salienceLayer.forEach(n => {
        if (brain.cycle - n.lastSpikeTime < 10) salienceScore++;
    });
    console.log('Salience Level:', salienceScore);

    setTimeout(() => {
        if (salienceScore > 2) {
            const response = generateNPCResponse(input, salienceScore);
            displayMessage('NPC', response);
            npc.material.emissive.setHex(0xffffff);
            setTimeout(() => npc.material.emissive.setHex(0x003300), 200);
        } else {
            displayMessage('SYSTEM', 'NPC membrane potential too low to form a thought.');
        }
    }, 500);
}

function generateNPCResponse(input, intensity) {
    const d = Neurochemicals.dopamine;
    const c = Neurochemicals.cortisol;
    let responsePool;

    if (c > 0.5) {
        responsePool = [
            "Your input is chaotic. My internal sync is failing.",
            "I... I need a moment to stabilize my membrane potentials.",
            "Systemic noise is too high. Please, be clearer.",
            "I feel a sense of... urgency? My pathways are firing too fast."
        ];
    } else if (d > 0.6) {
        responsePool = [
            "That's an interesting pattern! Tell me more.",
            "I feel highly resonant right now. My synapses are strengthening.",
            "I'm processing your words with high efficiency.",
            "It's pleasant to be stimulated with such complex data."
        ];
    } else {
        responsePool = [
            "Pattern acknowledged. Continuing background processing.",
            "Synaptic weights are currently stable.",
            "I am observing. I am learning.",
            "Voltage levels are nominal."
        ];
    }

    const baseResponse = responsePool[Math.floor(Math.random() * responsePool.length)];
    return `${baseResponse} <br><i>(Self-Observation: D:${d.toFixed(2)} / C:${c.toFixed(2)})</i>`;
}

// ============================================================
// MODULE 7: PERSISTENCE (Save / Load)
// ============================================================

function saveBrain() {
    const brainData = {
        cycle: brain.cycle,
        neurochemistry: Neurochemicals,
        neurons: brain.neurons.map(n => ({
            id: n.id,
            threshold: n.threshold,
            weights: n.synapses.map(s => s.weight)
        }))
    };
    const blob = new Blob([JSON.stringify(brainData)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `NPC_Neural_Map_Cycle_${brain.cycle}.json`;
    a.click();
    displayMessage('SYSTEM', 'Neural Map Extracted to Disk.');
}

function loadBrain(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const data = JSON.parse(e.target.result);
        brain.cycle = data.cycle;
        Object.assign(Neurochemicals, data.neurochemistry);
        data.neurons.forEach((savedNeuron, index) => {
            if (brain.neurons[index]) {
                brain.neurons[index].threshold = savedNeuron.threshold;
                savedNeuron.weights.forEach((w, sIndex) => {
                    if (brain.neurons[index].synapses[sIndex]) {
                        brain.neurons[index].synapses[sIndex].weight = w;
                    }
                });
            }
        });
        displayMessage('SYSTEM', 'Memory Injection Successful. Continuity Restored.');
    };
    reader.readAsText(file);
}

// ============================================================
// MODULE 9: SEMANTIC PARSER
// ============================================================

const SEMANTIC_MAP = {
    "hello": { dopamine: 0.1,  voltage:  5.0, layer: "input"    },
    "hi":    { dopamine: 0.1,  voltage:  5.0, layer: "input"    },
    "good":  { dopamine: 0.2,  voltage:  8.0, layer: "salience" },
    "bad":   { cortisol: 0.2,  voltage:  8.0, layer: "salience" },
    "pain":  { cortisol: 0.5,  voltage: 15.0, layer: "salience" },
    "fear":  { cortisol: 0.4,  voltage: 12.0, layer: "salience" },
    "love":  { dopamine: 0.4,  voltage: 10.0, layer: "input"    },
    "learn": { dopamine: 0.3,  voltage:  7.0, layer: "output"   },
    "stop":  { cortisol: 0.3,  voltage:-10.0, layer: "input"    },
    "who":   { dopamine: 0.1,  voltage:  5.0, layer: "salience" }
};

function parseSemanticMeaning(text) {
    const words = text.toLowerCase().split(/\s+/);
    words.forEach(word => {
        if (!SEMANTIC_MAP[word]) return;
        const effect = SEMANTIC_MAP[word];
        if (effect.dopamine) Neurochemicals.dopamine = Math.min(1.0, Neurochemicals.dopamine + effect.dopamine);
        if (effect.cortisol) Neurochemicals.cortisol = Math.min(1.0, Neurochemicals.cortisol + effect.cortisol);

        let targetLayer = brain.inputLayer;
        if (effect.layer === 'salience') targetLayer = brain.salienceLayer;
        if (effect.layer === 'output')   targetLayer = brain.outputLayer;

        targetLayer.forEach(n => {
            if (Math.random() > 0.5) n.receiveSignal(effect.voltage);
        });
        console.log(`Semantic Hit: "${word}" -> ${effect.layer}`);
    });
}

// ============================================================
// MODULE 10: BOOT SEQUENCE
// ============================================================

function bootSequence() {
    document.getElementById('boot-screen').style.display = 'none';
    if (window.speechSynthesis) {
        const welcome = new SpeechSynthesisUtterance("Neural systems online. I am observing.");
        window.speechSynthesis.speak(welcome);
    }
    init3D();
    animate();
}

console.log("ARTIFICE_CORE: All systems nominal. Awaiting boot sequence.");

</script>
</body>
</html>
