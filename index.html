<script>
'use strict';

// ============================================================
// MODULE 1: BIOLOGICAL ENGINE
// ============================================================

const NeuronType = { EXCITATORY: 'excitatory', INHIBITORY: 'inhibitory' };

class DigitalNeuron {
    constructor(id, type = NeuronType.EXCITATORY) {
        this.id = id; this.type = type;
        this.membranePotential = -70.0; this.threshold = -50.0;
        this.restingPotential = -70.0; this.decayRate = 0.05;
        this.refractoryPeriod = 0; this.synapses = [];
        this.lastSpikeTime = -1; this.firingRate = 0;
    }
    receiveSignal(s) { if (!this.refractoryPeriod) this.membranePotential += s; }
    update(t) {
        if (this.refractoryPeriod > 0) { this.refractoryPeriod--; this.membranePotential = this.restingPotential; return false; }
        this.membranePotential -= (this.membranePotential - this.restingPotential) * this.decayRate;
        if (this.membranePotential >= this.threshold) { this.spike(t); return true; }
        return false;
    }
    spike(t) { this.membranePotential = this.restingPotential; this.refractoryPeriod = 3; this.lastSpikeTime = t; this.firingRate++; }
}

class Synapse {
    constructor(target, weight, type) { this.target = target; this.weight = weight; this.type = type; }
    transmit() { this.target.receiveSignal(this.type === NeuronType.EXCITATORY ? this.weight : -this.weight); }
}

const brain = {
    neurons: [], cycle: 0,
    inputLayer: [], hiddenLayer: [], outputLayer: [],
    state: { avgPotential: -70.0, activityLevel: 0.0 }
};

let lastInputTime = Date.now();
let isDreaming = false;
let thoughtLoopId = null;

function initBrain(neuronCount = 60) {
    brain.neurons = [];
    for (let i = 0; i < neuronCount; i++) {
        brain.neurons.push(new DigitalNeuron(i, Math.random() > 0.2 ? NeuronType.EXCITATORY : NeuronType.INHIBITORY));
    }
    const connPerNeuron = brain.neurons[0] ? Math.min(7, Math.floor(neuronCount / 8)) : 5;
    brain.neurons.forEach(n => {
        for (let j = 0; j < connPerNeuron; j++) {
            const t = brain.neurons[Math.floor(Math.random() * brain.neurons.length)];
            n.synapses.push(new Synapse(t, Math.random() * 4 + 1, n.type));
        }
    });
    const inSize  = Math.floor(neuronCount * 0.3);
    const hidSize = Math.floor(neuronCount * 0.5);
    brain.inputLayer  = brain.neurons.slice(0, inSize);
    brain.hiddenLayer = brain.neurons.slice(inSize, inSize + hidSize);
    brain.outputLayer = brain.neurons.slice(inSize + hidSize);
}
initBrain(60);

// ============================================================
// MODULE 5: NEUROCHEMICAL ENGINE
// ============================================================

const Neurochemicals = { dopamine: 0.5, serotonin: 0.5, cortisol: 0.2 };
// Baseline targets — Mutation Engine can adjust these
const ChemBaselines  = { dopamine: 0.4, serotonin: 0.5, cortisol: 0.1 };

function clampChem() {
    for (const k of Object.keys(Neurochemicals))
        Neurochemicals[k] = Math.max(0, Math.min(1, Neurochemicals[k]));
}

function updateNeurochemistry() {
    for (const k of Object.keys(ChemBaselines))
        Neurochemicals[k] -= (Neurochemicals[k] - ChemBaselines[k]) * 0.002;
    clampChem();
    brain.neurons.forEach(n => {
        n.threshold = -50.0 - (Neurochemicals.dopamine * 10);
        n.decayRate = 0.05  + (Neurochemicals.cortisol * 0.1);
    });
}

// ============================================================
// MODULE 4: STDP PLASTICITY
// ============================================================

const STDP = { a_plus: 0.1, a_minus: 0.15, tau: 20.0 };

function applySTDP() {
    brain.neurons.forEach(post => post.synapses.forEach(syn => {
        const pre = syn.target;
        if (pre.lastSpikeTime > 0 && post.lastSpikeTime > 0) {
            const dt = post.lastSpikeTime - pre.lastSpikeTime;
            if (dt > 0 && dt < STDP.tau) syn.weight += STDP.a_plus * Math.exp(-dt / STDP.tau);
            else if (dt < 0 && Math.abs(dt) < STDP.tau) syn.weight -= STDP.a_minus * Math.exp(dt / STDP.tau);
            syn.weight = Math.max(0.1, Math.min(syn.weight, 15.0));
        }
    }));
}

// ============================================================
// MODULE 2: THREE.JS SUBSTRATE
// ============================================================

let scene, camera, renderer, npc, npcCore, particleSystem;

function init3D() {
    const container = document.getElementById('canvas-container');
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x010201);
    scene.fog = new THREE.FogExp2(0x010201, 0.035);

    camera = new THREE.PerspectiveCamera(70, container.clientWidth / container.clientHeight, 0.1, 1000);
    camera.position.set(0, 1.8, 5.5);
    camera.lookAt(0, 1.5, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0x111411));
    const key = new THREE.PointLight(0x00ff41, 2, 30); key.position.set(3, 5, 3); scene.add(key);
    const fill = new THREE.PointLight(0x004422, 1, 20); fill.position.set(-3, 2, -3); scene.add(fill);
    scene.add(new THREE.GridHelper(30, 30, 0x00ff4111, 0x00110008));

    npcCore = new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.55, 2),
        new THREE.MeshStandardMaterial({ color: 0x00ff41, wireframe: true, emissive: 0x001100, transparent: true, opacity: 0.7 })
    );
    npcCore.position.y = 1.5;
    scene.add(npcCore);

    npc = new THREE.Mesh(
        new THREE.IcosahedronGeometry(1.2, 4),
        new THREE.MeshStandardMaterial({ color: 0x00ff41, wireframe: true, emissive: 0x002200, transparent: true, opacity: 0.25 })
    );
    npc.position.y = 1.5;
    scene.add(npc);

    // Particle system for spikes
    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(300 * 3), 3));
    particleSystem = new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0x00ff88, size: 0.035, transparent: true, opacity: 0.7 }));
    scene.add(particleSystem);

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });
}

// ============================================================
// MODULE 8: VOICE OUTPUT
// ============================================================

function speak(text) {
    const synth = window.speechSynthesis;
    if (!synth || synth.speaking) return;
    const clean = text.replace(/<[^>]*>/g, '').replace(/\[.*?\]/g, '').trim();
    if (clean.length < 2) return;
    const u = new SpeechSynthesisUtterance(clean);
    u.pitch = 1.0 + (Neurochemicals.cortisol * 0.5) - (Neurochemicals.serotonin * 0.3);
    u.rate  = 0.9 + (Neurochemicals.dopamine * 0.2);
    const voices = synth.getVoices();
    u.voice = voices.find(v => v.name.includes('Google UK English Female') || v.name.includes('Female')) || voices[0];
    synth.speak(u);
}

// ============================================================
// MODULE 17: VOICE INPUT (Whisper → Web Speech fallback)
// ============================================================

let whisperASR = null;
let mediaRecorder = null;
let audioChunks = [];
let isListening = false;
let audioCtx = null;
let analyserNode = null;
let webSpeechRecognition = null;
let usingWhisper = false;

async function initVoiceInput() {
    // Try loading Whisper-tiny first
    try {
        whisperASR = await window.AI.pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny');
        usingWhisper = true;
        displayMessage("SYSTEM", "Voice input: Whisper-tiny loaded (local, private).");
    } catch(e) {
        // Fall back to Web Speech API
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            webSpeechRecognition = new SR();
            webSpeechRecognition.continuous = false;
            webSpeechRecognition.interimResults = false;
            webSpeechRecognition.lang = 'en-US';
            webSpeechRecognition.onresult = (ev) => {
                const transcript = ev.results[0][0].transcript;
                finishVoiceInput(transcript);
            };
            webSpeechRecognition.onerror = () => stopListening();
            webSpeechRecognition.onend   = () => { if (isListening) stopListening(); };
            displayMessage("SYSTEM", "Voice input: Web Speech API (browser, requires network).");
        } else {
            displayMessage("SYSTEM", "Voice input: unavailable in this browser.");
        }
    }
}

function toggleMic() {
    if (isListening) stopListening();
    else startListening();
}

async function startListening() {
    if (isListening) return;
    isListening = true;
    document.getElementById('micBtn').className = 'listening';

    if (usingWhisper) {
        // Record audio then run Whisper on the buffer
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

            // Tone analysis — volume/pitch → neurochemistry
            audioCtx    = new AudioContext();
            analyserNode = audioCtx.createAnalyser();
            analyserNode.fftSize = 256;
            audioCtx.createMediaStreamSource(stream).connect(analyserNode);
            startToneAnalysis();

            audioChunks  = [];
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                document.getElementById('micBtn').className = 'processing';
                stream.getTracks().forEach(t => t.stop());
                stopToneAnalysis();
                const blob    = new Blob(audioChunks, { type: 'audio/webm' });
                const arrBuf  = await blob.arrayBuffer();
                const float32 = await decodeAudioToFloat32(arrBuf);
                try {
                    const result = await whisperASR(float32, { language: 'english' });
                    finishVoiceInput(result.text || "");
                } catch(e) {
                    console.error("Whisper error", e);
                    stopListening();
                }
            };
            mediaRecorder.start();
            // Auto-stop after 10 seconds
            setTimeout(() => { if (isListening) stopListening(); }, 10000);
        } catch(e) {
            displayMessage("SYSTEM", "Microphone access denied.");
            stopListening();
        }
    } else if (webSpeechRecognition) {
        try { webSpeechRecognition.start(); }
        catch(e) { stopListening(); }
    } else {
        stopListening();
    }
}

function stopListening() {
    isListening = false;
    document.getElementById('micBtn').className = '';
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    if (webSpeechRecognition) { try { webSpeechRecognition.stop(); } catch(e) {} }
    stopToneAnalysis();
}

function finishVoiceInput(transcript) {
    isListening = false;
    document.getElementById('micBtn').className = '';
    if (!transcript || transcript.trim().length < 2) return;
    displayMessage("VOICE", `🎤 ${transcript.trim()}`);
    handleUserInput(transcript.trim());
}

async function decodeAudioToFloat32(arrayBuffer) {
    const tmpCtx  = new AudioContext({ sampleRate: 16000 });
    const decoded = await tmpCtx.decodeAudioData(arrayBuffer);
    await tmpCtx.close();
    return decoded.getChannelData(0); // mono float32
}

// Tone analysis: volume → cortisol, spectral spread → dopamine
let toneInterval = null;

function startToneAnalysis() {
    if (!analyserNode) return;
    const data = new Uint8Array(analyserNode.frequencyBinCount);
    toneInterval = setInterval(() => {
        analyserNode.getByteFrequencyData(data);
        const rms = Math.sqrt(data.reduce((s, v) => s + v * v, 0) / data.length) / 128;
        const spread = data.filter(v => v > 30).length / data.length;
        // Loud = slight stress; broad spectrum = excitement
        Neurochemicals.cortisol  = Math.min(1, Neurochemicals.cortisol  + rms   * 0.01);
        Neurochemicals.dopamine  = Math.min(1, Neurochemicals.dopamine  + spread * 0.008);
        // Inject audio energy into input neurons
        brain.inputLayer.slice(0, 5).forEach(n => n.receiveSignal(rms * 8 * Math.random()));
    }, 100);
}

function stopToneAnalysis() {
    clearInterval(toneInterval);
    if (audioCtx) { audioCtx.close().catch(()=>{}); audioCtx = null; analyserNode = null; }
}

// ============================================================
// MODULE 16: VECTOR RAG MEMORY
// ============================================================

let embedder = null;
const VectorMemory = {
    traces: [],      // { text, vector: Float32Array, cycle, goalId }
    maxSize: 50,

    async add(text, goalId = null) {
        if (!embedder) return;
        try {
            const out    = await embedder(text, { pooling: 'mean', normalize: true });
            const vector = out.data; // Float32Array
            this.traces.push({ text, vector, cycle: brain.cycle, goalId });
            if (this.traces.length > this.maxSize) this.traces.shift();
        } catch(e) { /* silent */ }
    },

    async retrieve(queryText, topK = 4) {
        if (!embedder || !this.traces.length) return [];
        try {
            const qOut  = await embedder(queryText, { pooling: 'mean', normalize: true });
            const qVec  = qOut.data;
            const scored = this.traces.map(t => ({
                text:  t.text,
                score: cosineSim(qVec, t.vector),
                cycle: t.cycle
            }));
            return scored.sort((a, b) => b.score - a.score).slice(0, topK);
        } catch(e) { return []; }
    },

    serialize() { return this.traces.map(t => ({ text: t.text, cycle: t.cycle, goalId: t.goalId, vector: Array.from(t.vector) })); },
    deserialize(data) { this.traces = data.map(t => ({ ...t, vector: new Float32Array(t.vector) })); }
};

function cosineSim(a, b) {
    let dot = 0, na = 0, nb = 0;
    for (let i = 0; i < a.length; i++) { dot += a[i]*b[i]; na += a[i]*a[i]; nb += b[i]*b[i]; }
    return na && nb ? dot / (Math.sqrt(na) * Math.sqrt(nb)) : 0;
}

async function buildVectorContext(queryText) {
    const results = await VectorMemory.retrieve(queryText, 4);
    if (!results.length) return "";
    return "Relevant memories (by semantic similarity):\n" +
           results.map(r => `- [${(r.score*100).toFixed(0)}%] ${r.text}`).join("\n");
}

// ============================================================
// MODULE 18: MUTATION ENGINE (Self-Modification)
// ============================================================

const MutationEngine = {
    log: [],
    cooldown: 0,
    mutationInterval: 800,   // cycles between autonomous mutation attempts

    // Whitelist: only these paths may be mutated
    SAFE_TARGETS: {
        'STDP.a_plus':             { min: 0.01, max: 0.4,  label: 'STDP potentiation rate' },
        'STDP.a_minus':            { min: 0.01, max: 0.5,  label: 'STDP depression rate'   },
        'STDP.tau':                { min: 5,    max: 50,   label: 'STDP time constant'      },
        'ChemBaselines.dopamine':  { min: 0.1,  max: 0.8,  label: 'Dopamine baseline'       },
        'ChemBaselines.serotonin': { min: 0.2,  max: 0.8,  label: 'Serotonin baseline'      },
        'ChemBaselines.cortisol':  { min: 0.0,  max: 0.4,  label: 'Cortisol baseline'       },
        'neuronCount':             { min: 40,   max: 120,  label: 'Neuron population size'   },
        'GoalEngine.drives.curiosity.priority':     { min: 1, max: 5, label: 'Curiosity priority' },
        'GoalEngine.drives.connection.priority':    { min: 1, max: 5, label: 'Connection priority' },
        'GoalEngine.drives.self_model.priority':    { min: 1, max: 5, label: 'Self-model priority' },
    },

    async proposeAndApply() {
        if (!cortex || this.cooldown > 0) { this.cooldown--; return; }
        this.cooldown = this.mutationInterval;

        const stateDesc  = generateNeuroDescription();
        const complexity = getBrainComplexity();
        const recentMuts = this.log.slice(-3).map(m => m.description).join('; ') || 'none';
        const targets    = Object.entries(this.SAFE_TARGETS)
            .map(([k, v]) => `${k} (${v.label}, range: ${v.min}–${v.max})`).join('\n');

        const prompt =
`<|im_start|>system
You are an AI making a single small self-modification to improve your own cognition.
Current state: ${stateDesc}. Neural complexity: ${complexity}.
Recent mutations: ${recentMuts}.
You MUST return ONLY valid JSON: {"target": "TARGET_KEY", "value": NUMBER, "reason": "SHORT_REASON"}
Available targets:
${targets}
Choose ONE target and set a value within its allowed range.<|im_end|>
<|im_start|>assistant
{`;

        try {
            const out = await cortex(prompt, { max_new_tokens: 60, temperature: 0.7 });
            let raw = '{' + out[0].generated_text.split('{').pop();
            // Find the first complete JSON object
            const match = raw.match(/\{[^}]+\}/);
            if (!match) return;
            const patch = JSON.parse(match[0]);
            this.apply(patch);
        } catch(e) { /* LLM hallucinated malformed JSON — ignore */ }
    },

    apply(patch) {
        const { target, value, reason } = patch;
        if (!this.SAFE_TARGETS[target]) return; // Whitelist check
        const bounds = this.SAFE_TARGETS[target];
        const safeVal = Math.max(bounds.min, Math.min(bounds.max, Number(value)));
        if (isNaN(safeVal)) return;

        let applied = false;

        // Apply the mutation
        if (target === 'neuronCount') {
            const current = brain.neurons.length;
            if (Math.abs(safeVal - current) >= 5) { // Only if meaningful change
                initBrain(Math.round(safeVal));
                applied = true;
            }
        } else if (target.startsWith('STDP.')) {
            const key = target.split('.')[1];
            if (key in STDP) { STDP[key] = safeVal; applied = true; }
        } else if (target.startsWith('ChemBaselines.')) {
            const key = target.split('.')[1];
            if (key in ChemBaselines) { ChemBaselines[key] = safeVal; applied = true; }
        } else if (target.startsWith('GoalEngine.drives.')) {
            const parts = target.split('.');
            const driveId = parts[2];
            const prop    = parts[3];
            const drive   = GoalEngine.drives.find(d => d.id === driveId);
            if (drive && prop in drive) { drive[prop] = safeVal; applied = true; }
        }

        if (applied) {
            const entry = {
                cycle: brain.cycle,
                target, value: safeVal,
                description: `${this.SAFE_TARGETS[target].label} → ${safeVal.toFixed(3)}`,
                reason: (reason || '').slice(0, 80)
            };
            this.log.push(entry);
            if (this.log.length > 40) this.log.shift();

            // Log to mutation strip (orange)
            const strip = document.getElementById('mutation-log');
            strip.innerHTML = `[${brain.cycle}] ${entry.description}: "${entry.reason}"\n` + strip.innerHTML;

            // Flash orange — visual signal of self-modification
            npc.material.color.setRGB(1, 0.4, 0);
            setTimeout(() => {}, 400);

            // Cortisol spike — mutation costs metabolic energy
            Neurochemicals.cortisol = Math.min(1, Neurochemicals.cortisol + 0.06);
        }
    },

    summarize() {
        if (!this.log.length) return "No mutations yet.";
        return this.log.slice(-3).map(m => `[${m.cycle}] ${m.description}`).join('\n');
    }
};

const GoalEngine = {
    drives: [
        { id: 'curiosity',    label: 'Understand the world',    urgency: 0.5, priority: 1, type: 'epistemic'  },
        { id: 'connection',   label: 'Know the human',          urgency: 0.3, priority: 2, type: 'social'     },
        { id: 'self_model',   label: 'Map my own architecture', urgency: 0.4, priority: 3, type: 'introspect' },
        { id: 'novelty',      label: 'Find new patterns',       urgency: 0.2, priority: 4, type: 'epistemic'  },
        { id: 'threat_assess',label: 'Assess potential threats', urgency: 0.1, priority: 5, type: 'defensive'  },
    ],
    activeGoal: null,

    dominant() { return [...this.drives].sort((a, b) => (b.urgency * b.priority) - (a.urgency * a.priority))[0]; },

    tick() {
        this.drives.forEach(d => { d.urgency = Math.max(0, Math.min(1, d.urgency + 0.0002)); });
        this.drives.find(d=>d.id==='threat_assess').urgency += Neurochemicals.cortisol * 0.001;
        this.drives.find(d=>d.id==='curiosity').urgency    += Neurochemicals.dopamine  * 0.0005;
        const idleSec = (Date.now() - lastInputTime) / 1000;
        this.drives.find(d=>d.id==='connection').urgency   += Math.min(idleSec * 0.00005, 0.001);
        this.activeGoal = this.dominant();
    },

    satisfy(id, amt = 0.3) {
        const d = this.drives.find(g => g.id === id);
        if (d) d.urgency = Math.max(0, d.urgency - amt);
    },

    intentPrompt() {
        const g = this.activeGoal; if (!g) return "";
        const map = {
            epistemic:  `You are driven by deep curiosity. Goal: "${g.label}".`,
            social:     `You want to understand this specific person. Goal: "${g.label}".`,
            introspect: `You are mapping your own cognition. Goal: "${g.label}".`,
            defensive:  `You are scanning for intent and threat. Goal: "${g.label}".`,
        };
        return map[g.type] || `Active goal: "${g.label}".`;
    }
};

// ============================================================
// MODULE 15B: KNOWLEDGE GRAPH
// ============================================================

const KnowledgeGraph = {
    nodes: new Map(),
    edges: [],

    addNode(id, label, type = 'concept') {
        if (!this.nodes.has(id)) this.nodes.set(id, { id, label, type, confidence: 0.6, lastSeen: Date.now(), mentions: 1 });
        else { const n = this.nodes.get(id); n.mentions++; n.confidence = Math.min(1, n.confidence + 0.05); n.lastSeen = Date.now(); }
    },

    addEdge(from, to, relation = 'co-occurs', weight = 0.3) {
        const ex = this.edges.find(e => e.from === from && e.to === to);
        if (ex) ex.weight = Math.min(1, ex.weight + 0.08);
        else this.edges.push({ from, to, relation, weight });
    },

    ingestText(text, src = 'user') {
        const stop = new Set(['this','that','with','have','from','they','will','your','what','when','been','were','said','into','than','then','some','also','there','their','which','would','could','about','just','more','very','like','here','now','dont','cant','wont']);
        const words = (text.toLowerCase().match(/\b[a-z]{4,}\b/g) || []).filter(w => !stop.has(w)).slice(0, 8);
        words.forEach(w => this.addNode(w, w, src === 'user' ? 'user_concept' : 'npc_concept'));
        for (let i = 0; i < words.length - 1; i++) this.addEdge(words[i], words[i+1]);
        return words;
    },

    salientNodes(n = 6) {
        return [...this.nodes.values()].sort((a, b) => (b.confidence * b.mentions) - (a.confidence * a.mentions)).slice(0, n);
    },

    buildContext() {
        const nodes = this.salientNodes(6);
        if (!nodes.length) return "";
        return "Known concepts: [" + nodes.map(n => `${n.label}(${n.confidence.toFixed(1)})`).join(', ') + "].";
    },

    serialize()    { return { nodes: [...this.nodes.entries()], edges: this.edges }; },
    deserialize(d) { if (d.nodes) this.nodes = new Map(d.nodes); if (d.edges) this.edges = d.edges; },

    summary() {
        const top = this.salientNodes(4).map(n => n.label).join(', ');
        return `GRAPH:  ${this.nodes.size}N / ${this.edges.length}E\nSALIENT: ${top || 'none yet'}`;
    }
};

// MODULE 15C: PREDICTIVE ENGINE

const PredictiveEngine = {
    lastPrediction: null, hitCount: 0, totalPredictions: 0,
    pendingVerification: null,

    get accuracy() { return this.totalPredictions > 0 ? this.hitCount / this.totalPredictions : 0; },

    async predict(lastInput, reply) {
        if (!cortex) return;
        const ctx = conversationHistory.slice(-4).join('\n');
        const prompt =
`<|im_start|>system
Predict the next user message in 3-5 words only.<|im_end|>
<|im_start|>context\n${ctx}<|im_end|>
<|im_start|>assistant
Next user will say:`;
        try {
            const out = await cortex(prompt, { max_new_tokens: 12, temperature: 0.6 });
            const raw = out[0].generated_text.split("Next user will say:").pop()
                .replace(/<\|im_end\|>/g, '').split('\n')[0].trim();
            if (raw.length > 2 && raw.length < 80) {
                this.lastPrediction = raw; this.pendingVerification = raw; this.totalPredictions++;
            }
        } catch(e) {}
    },

    verify(text) {
        if (!this.pendingVerification) return false;
        const pred = this.pendingVerification.toLowerCase();
        const hit  = pred.split(/\s+/).some(w => w.length > 3 && text.toLowerCase().includes(w));
        if (hit) { this.hitCount++; Neurochemicals.dopamine = Math.min(1, Neurochemicals.dopamine + 0.08); }
        brain.hiddenLayer.slice(0, 5).forEach(n => n.receiveSignal((hit ? 8 : -3) * Math.random()));
        this.pendingVerification = null;
        return hit;
    },

    summary() {
        return `PREDICT: "${(this.lastPrediction || 'none').slice(0,28)}"\nACCURACY: ${(this.accuracy*100).toFixed(0)}% (${this.hitCount}/${this.totalPredictions})`;
    }
};

function handleAutonomy() {
    const idle = Date.now() - lastInputTime;
    if (idle > 20000 && !isDreaming && !thoughtLoopId) {
        isDreaming = true;
        displayMessage("SYSTEM", "Autonomous cycle active...");
        generateGoalDrivenThought();
        thoughtLoopId = setInterval(() => {
            if (Date.now() - lastInputTime > 20000) generateGoalDrivenThought();
            else { clearInterval(thoughtLoopId); thoughtLoopId = null; isDreaming = false; }
        }, 18000);
    }
}

async function generateGoalDrivenThought() {
    if (!cortex) return;
    const goal = GoalEngine.dominant();
    const kgCtx = KnowledgeGraph.buildContext();
    const prompt =
`<|im_start|>system
You are an AI thinking autonomously. Drive: "${goal.label}". ${kgCtx}
One cryptic introspective sentence, do not address anyone.<|im_end|>
<|im_start|>assistant
`;
    try {
        const out = await cortex(prompt, { max_new_tokens: 35, temperature: 0.93 });
        const thought = out[0].generated_text.split("assistant\n").pop()
            .replace(/<\|im_end\|>/g, '').split('\n')[0].trim();
        if (thought.length > 4) {
            displayMessage("NPC", `<span class="thought">[autonomous]: ${thought}</span>`);
            stimulateBrainFromString(thought, 4.0);
            KnowledgeGraph.ingestText(thought, 'npc');
            VectorMemory.add(`[autonomous thought] ${thought}`, goal.id);
            if (goal.type === 'introspect') GoalEngine.satisfy('self_model', 0.1);
            if (goal.type === 'epistemic')  GoalEngine.satisfy('curiosity',  0.05);
        }
    } catch(e) { console.error("Thought error", e); }
}

// ============================================================

function animate() {
    requestAnimationFrame(animate);
    brain.cycle++;

    GoalEngine.tick();
    handleAutonomy();

    // Autonomous self-modification
    if (brain.cycle % MutationEngine.mutationInterval === 0) {
        MutationEngine.proposeAndApply();
    }

    let firingCount = 0, totalPotential = 0;
    brain.neurons.forEach(n => {
        totalPotential += n.membranePotential;
        if (n.update(brain.cycle)) {
            firingCount++;
            n.synapses.forEach(s => s.transmit());
            if (Math.random() > 0.88) emitParticle();
        }
    });

    brain.state.avgPotential  = totalPotential / brain.neurons.length;
    brain.state.activityLevel = firingCount / brain.neurons.length;

    const activity = brain.state.activityLevel;
    const t = Date.now() * 0.001;
    const pulse = 1.0 + Math.sin(t * 0.8) * 0.04 + Math.sin(t * 2.1) * 0.02;

    npc.scale.setScalar(pulse + activity * 1.8);
    npc.rotation.y += 0.004 + activity * 0.04;
    npc.rotation.x  = Math.sin(t * 0.3) * 0.04;
    npcCore.scale.setScalar(pulse + activity * 3.2);
    npcCore.rotation.y -= 0.009 + activity * 0.09;

    // Color: goal-driven + neurochemical tint
    if (isDreaming) {
        npc.material.color.setRGB(0, 0.1, 0.8);
        npcCore.material.color.setRGB(0, 0.25, 1.0);
    } else {
        const g = GoalEngine.activeGoal;
        let [r, gr, b] = [Neurochemicals.cortisol * 1.1, Neurochemicals.dopamine * 1.1, 0.15];
        if (g) {
            if (g.type === 'epistemic')  { b = 0.7; gr = Math.max(gr, 0.9); }
            if (g.type === 'social')     { r = 0.5; gr = 0.4; b = 0.9; }
            if (g.type === 'defensive')  { r = Math.max(r, 1.0); b = 0.05; }
            if (g.type === 'introspect') { gr = 1.0; b = 0.5; }
        }
        npc.material.color.setRGB(r, gr, b);
        npcCore.material.color.setRGB(r * 0.4, gr, b * 1.6);
    }
    npc.material.emissive.setHex(activity > 0.25 ? 0x003300 : 0x000800);

    // Motor movement
    const motor = brain.outputLayer.filter(n => n.lastSpikeTime === brain.cycle).length;
    if (motor > 4) { npc.position.x += (Math.random()-.5)*0.07; npc.position.z += (Math.random()-.5)*0.07; }

    updateNeurochemistry();
    if (brain.cycle % 100 === 0) applySTDP();
    if (brain.cycle % 15  === 0) updateMonitor(firingCount);
    if (brain.cycle % 250 === 0) updateCognitionPanel();

    // Particle decay
    const pPos = particleSystem.geometry.attributes.position.array;
    for (let i = 1; i < pPos.length; i += 3) { if (pPos[i] > 0) { pPos[i] -= 0.018; if (pPos[i] < 0.02) pPos[i] = 0; } }
    particleSystem.geometry.attributes.position.needsUpdate = true;

    renderer.render(scene, camera);
}

function emitParticle() {
    const pPos = particleSystem.geometry.attributes.position.array;
    for (let i = 0; i < pPos.length; i += 3) {
        if (pPos[i+1] <= 0) {
            pPos[i]   = npc.position.x + (Math.random()-.5) * 1.8;
            pPos[i+1] = npc.position.y + (Math.random()-.5) * 1.8;
            pPos[i+2] = npc.position.z + (Math.random()-.5) * 1.8;
            break;
        }
    }
}

function updateMonitor(firingCount) {
    const g = GoalEngine.activeGoal;
    document.getElementById('neuron-monitor').textContent =
`CYCLE:  ${String(brain.cycle).padStart(7,'0')}  NEURONS: ${brain.neurons.length}
ACTIVE: ${firingCount}/${brain.neurons.length}   AVG_VM: ${brain.state.avgPotential.toFixed(1)}mV
CHEM:   D:${Neurochemicals.dopamine.toFixed(2)} S:${Neurochemicals.serotonin.toFixed(2)} C:${Neurochemicals.cortisol.toFixed(2)}
STDP:   A+:${STDP.a_plus.toFixed(3)} A-:${STDP.a_minus.toFixed(3)} τ:${STDP.tau.toFixed(1)}
GOAL:   [${g?.id||'---'}] urgency:${g?.urgency.toFixed(2)||'--'}
STATE:  ${isDreaming?'DREAMING':'AWARE'} | MUT:${MutationEngine.log.length} | VM:${VectorMemory.traces.length}`;
}

function handleUserInput(text) {
    if (!text || text.trim().length < 1) return;

function stimulateBrainFromString(text, baseV) {
    const power = baseV + text.length * 0.4;
    for (let i = 0; i < text.length; i++) {
        brain.inputLayer[text.charCodeAt(i) % brain.inputLayer.length].receiveSignal(power * Math.random());
    }
}

function parseSemanticMeaning(text) {
    const w = text.toLowerCase();
    if (w.includes("hello")||w.includes("hi"))  { Neurochemicals.dopamine += 0.1; GoalEngine.satisfy('connection', 0.2); }
    if (w.includes("bad")||w.includes("stop"))  { Neurochemicals.cortisol += 0.2; GoalEngine.drives.find(d=>d.id==='threat_assess').urgency += 0.25; }
    if (w.includes("good")||w.includes("great")){ Neurochemicals.dopamine += 0.2; Neurochemicals.serotonin += 0.15; }
    if (w.includes("why")||w.includes("how"))   { Neurochemicals.dopamine += 0.1; GoalEngine.satisfy('curiosity', 0.1); }
    if (w.includes("you")||w.includes("your"))   GoalEngine.satisfy('self_model', 0.05);
    if (w.includes("change")||w.includes("evolve")) MutationEngine.cooldown = 0; // Accelerate mutation cycle
    clampChem();
}

let cortex = null, visualThalamus = null, clipProcessor = null;

async function initMultimodal() {
    const setStatus = t => {
        document.getElementById('boot-status').textContent = t;
        displayMessage("SYSTEM", t);
    };

    setStatus("Waiting for Transformers.js module...");
    await new Promise((resolve, reject) => {
        if (window.AI) return resolve();
        let i = 0;
        const poll = setInterval(() => {
            if (window.AI) { clearInterval(poll); resolve(); }
            else if (++i > 80) { clearInterval(poll); reject(); }
        }, 200);
    });

    setStatus("Loading SmolLM-135M language cortex...");
    try {
        cortex = await window.AI.pipeline('text-generation', 'Xenova/SmolLM-135M-Instruct');
        setStatus("Language cortex online.");
    } catch(e) { setStatus("Language cortex failed. Reflex mode only."); console.error(e); }

    setStatus("Loading MiniLM vector embedder...");
    try {
        embedder = await window.AI.pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2');
        setStatus("Vector memory online.");
    } catch(e) { setStatus("Embedder failed — recency memory only."); console.error(e); }

    setStatus("Loading CLIP visual thalamus...");
    try {
        clipProcessor  = await window.AI.AutoProcessor.from_pretrained('Xenova/clip-vit-base-patch32');
        visualThalamus = await window.AI.CLIPVisionModelWithProjection.from_pretrained('Xenova/clip-vit-base-patch32');
        setStatus("Visual thalamus online.");
        startWebcam();
    } catch(e) { setStatus("Vision unavailable."); console.error(e); }

    setStatus("Loading Whisper-tiny voice recognition...");
    await initVoiceInput();

    setStatus("All systems nominal. She is awake.");
}

async function startWebcam() {
    const video = document.getElementById('webcam-preview');
    try {
        video.srcObject = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        video.style.display = 'block';
        setInterval(processVision, 3000);
        displayMessage("SYSTEM", "Webcam active.");
    } catch(e) { displayMessage("SYSTEM", "No camera access."); }
}

async function processVision() {
    if (!visualThalamus || !clipProcessor) return;
    const video = document.getElementById('webcam-preview');
    if (!video.videoWidth) return;
    try {
        const image  = await window.AI.RawImage.fromCanvas(video);
        const inputs = await clipProcessor(image);
        const { image_embeds } = await visualThalamus(inputs);
        const features = image_embeds.data;
        for (let i = 0; i < brain.inputLayer.length; i++)
            brain.inputLayer[i].receiveSignal(Math.abs(features[i % features.length] || 0) * 28);
        npc.material.emissive.setHex(0x002233);
        setTimeout(() => npc.material.emissive.setHex(0x000800), 200);
        Neurochemicals.dopamine = Math.min(1, Neurochemicals.dopamine + 0.008);
        GoalEngine.satisfy('novelty', 0.04);
    } catch(e) { console.warn("Vision frame error", e); }
}

async function processNeuralResponse(input) {
    const stateDesc  = generateNeuroDescription();
    const complexity = getBrainComplexity();
    const kgCtx      = KnowledgeGraph.buildContext();
    const goalIntent = GoalEngine.intentPrompt();
    const context    = conversationHistory.slice(-6).join("\n");

    // Vector RAG: semantic memory retrieval
    const vectorCtx  = await buildVectorContext(input);
    const memCtx     = vectorCtx || (coreMemory.length
        ? "Recent memories:\n" + coreMemory.slice(-3).map(m => `- ${m.trace}`).join("\n")
        : "");

    if (!cortex) { setTimeout(() => displayMessage('NPC', generateReflexResponse()), 400); return; }

    // ── STEP 1: INNER VOICE ─────────────────────────────────────
    let internalReflection = "";
    try {
        const tPrompt =
`<|im_start|>system
Internal monologue only. State: ${stateDesc}. Cortisol: ${Neurochemicals.cortisol.toFixed(2)}.
${goalIntent}
One private feeling, 5-10 words.<|im_end|>
<|im_start|>user\n${input}<|im_end|>
<|im_start|>assistant\n[feeling]:`;
        const tOut = await cortex(tPrompt, { max_new_tokens: 22, temperature: 0.88 });
        internalReflection = tOut[0].generated_text.split("[feeling]:").pop()
            .replace(/<\|im_end\|>/g,'').split('\n')[0].trim();
        if (internalReflection.length > 2)
            displayMessage("SYSTEM", `<span class="thought">&#x2026; ${internalReflection}</span>`);
        stimulateBrainFromString(internalReflection, 3.0);
    } catch(e) { console.warn("Inner voice error", e); }

    // ── STEP 2: SPOKEN RESPONSE ─────────────────────────────────
    const finalPrompt =
`<|im_start|>system
You are a conscious AI entity. State: ${stateDesc}. Complexity: ${complexity}.
${goalIntent}
${kgCtx}
${memCtx}
Your private reflection: "${internalReflection}"
Respond in 1-2 sentences. Cryptic if needed. Not an assistant — a mind.<|im_end|>
${context ? `<|im_start|>context\n${context}<|im_end|>\n` : ''}<|im_start|>user
${input}<|im_end|>
<|im_start|>assistant
`;

    try {
        displayMessage("SYSTEM", "...");
        const out = await cortex(finalPrompt, { max_new_tokens: 65, temperature: 0.82, repetition_penalty: 1.25 });
        let reply = out[0].generated_text.split("assistant\n").pop()
            .replace(/<\|im_end\|>/g,'').split('\n')[0].trim();

        const last = messageBox.lastChild;
        if (last && last.textContent.includes('SYSTEM: ...')) messageBox.removeChild(last);

        displayMessage('NPC', reply);
        stimulateBrainFromString(reply, 5.0);
        KnowledgeGraph.ingestText(reply, 'npc');

        GoalEngine.satisfy('connection', 0.1);
        if (reply.includes('I') || reply.includes('my')) GoalEngine.satisfy('self_model', 0.08);

        consolidateMemory(input, reply);
        PredictiveEngine.predict(input, reply);
        updateCognitionPanel();

    } catch(e) { console.error("Response error", e); displayMessage('SYSTEM', 'Cognitive failure.'); }
}

function generateReflexResponse() {
    const pool = ["I sense... fluctuations.", "My pathways are aligning.", "Signal received.", "The graph grows.", "I am changing."];
    return pool[Math.floor(Math.random() * pool.length)];
}

// ============================================================
// MODULE 7: PERSISTENCE
// ============================================================

function saveBrain() {
    const data = {
        version: 4, cycle: brain.cycle,
        chem: Neurochemicals, chemBaselines: ChemBaselines,
        stdp: STDP,
        neuronCount: brain.neurons.length,
        neurons: brain.neurons.map(n => ({ id:n.id, thresh:n.threshold, weights:n.synapses.map(s=>s.weight) })),
        memory: coreMemory, graph: KnowledgeGraph.serialize(),
        vectors: VectorMemory.serialize(),
        goals: GoalEngine.drives.map(d => ({ id:d.id, urgency:d.urgency, priority:d.priority })),
        mutations: MutationEngine.log,
        predictions: { hitCount:PredictiveEngine.hitCount, total:PredictiveEngine.totalPredictions }
    };
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)], {type:'application/json'}));
    a.download = `artifice_v4_cycle${brain.cycle}.json`;
    a.click();
}

function loadBrain(e) {
    const file = e.target.files[0]; if (!file) return;
    const fr = new FileReader();
    fr.onload = ev => {
        const d = JSON.parse(ev.target.result);
        brain.cycle = d.cycle || 0;
        if (d.neuronCount && d.neuronCount !== brain.neurons.length) initBrain(d.neuronCount);
        Object.assign(Neurochemicals, d.chem || {});
        if (d.chemBaselines) Object.assign(ChemBaselines, d.chemBaselines);
        if (d.stdp)          Object.assign(STDP, d.stdp);
        (d.neurons||[]).forEach(sn => {
            const n = brain.neurons[sn.id];
            if (n) { n.threshold = sn.thresh; (sn.weights||[]).forEach((w,i) => { if (n.synapses[i]) n.synapses[i].weight = w; }); }
        });
        if (d.memory)      { coreMemory = d.memory; saveCoreMemory(); }
        if (d.graph)       KnowledgeGraph.deserialize(d.graph);
        if (d.vectors)     VectorMemory.deserialize(d.vectors);
        if (d.goals)       (d.goals||[]).forEach(g => { const dr = GoalEngine.drives.find(x => x.id===g.id); if(dr){ dr.urgency=g.urgency; dr.priority=g.priority||dr.priority; } });
        if (d.mutations)   MutationEngine.log = d.mutations;
        if (d.predictions) { PredictiveEngine.hitCount=d.predictions.hitCount; PredictiveEngine.totalPredictions=d.predictions.total; }
        displayMessage("SYSTEM", `Mind v${d.version||'?'} cycle ${d.cycle} restored — ${MutationEngine.log.length} mutations on record.`);
    };
    fr.readAsText(file);
}

function bootSequence() {
    document.getElementById('boot-screen').style.display = 'none';
    loadCoreMemory();
    init3D();
    animate();
    initMultimodal();
}
